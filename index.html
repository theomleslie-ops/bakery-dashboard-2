<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakery Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.0/dist/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f1ed;
      color: #2c2416;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      margin-bottom: 40px;
    }

    h1 {
      font-size: 32px;
      color: #6b4423;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #8b6c57;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
      align-items: center;
    }

    .month-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      color: #6b4423;
      border: 1px solid #d4b5a0;
    }

    button:hover {
      background: #e8ddd5;
      border-color: #6b4423;
    }

    button.active {
      background: #6b4423;
      color: white;
      border-color: #6b4423;
    }

    .file-upload {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="file"] {
      padding: 8px;
      border: 1px solid #d4b5a0;
      border-radius: 6px;
      background: white;
    }

    .upload-btn {
      padding: 10px 20px;
      background: #6b4423;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    .upload-btn:hover {
      background: #5a3a1e;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }

    .metric-card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      border-left: 4px solid #6b4423;
      cursor: pointer;
      transition: all 0.2s;
    }

    .metric-card:hover {
      box-shadow: 0 4px 12px rgba(107, 68, 35, 0.15);
      transform: translateY(-2px);
    }

    .metric-card.active {
      background: #f5ede5;
      box-shadow: 0 4px 16px rgba(107, 68, 35, 0.25);
    }

    .metric-label {
      font-size: 12px;
      color: #8b6c57;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 600;
      color: #6b4423;
    }

    .chart-container {
      background: white;
      padding: 24px;
      border-radius: 8px;
      margin: 30px 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .chart-title {
      font-size: 16px;
      font-weight: 600;
      color: #6b4423;
      margin-bottom: 20px;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 16px;
      border-radius: 6px;
      margin: 20px 0;
    }

    .success {
      background: #efe;
      color: #3c3;
      padding: 16px;
      border-radius: 6px;
      margin: 20px 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1614;
        color: #e8ddd5;
      }
      button {
        background: #2c2416;
        color: #e8b9a0;
        border-color: #5a3a1e;
      }
      button:hover {
        background: #3a3228;
      }
      .metric-card {
        background: #2c2416;
        color: #e8ddd5;
      }
      .chart-container {
        background: #2c2416;
      }
      h1 {
        color: #e8b9a0;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DASHBOARD_PASSWORD = 'bakery123';

    function LoginScreen({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (password === DASHBOARD_PASSWORD) {
          localStorage.setItem('bakery_auth', 'true');
          onLogin();
        } else {
          setError('Incorrect password');
          setPassword('');
        }
      };

      return (
        <div style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          minHeight: '100vh',
          background: '#f5f1ed'
        }}>
          <div style={{
            background: 'white',
            padding: '40px',
            borderRadius: '12px',
            boxShadow: '0 4px 12px rgba(0,0,0,0.1)',
            width: '100%',
            maxWidth: '320px'
          }}>
            <h1 style={{ textAlign: 'center', color: '#6b4423', marginBottom: '30px', fontSize: '24px' }}>
              🍞 Bakery Dashboard
            </h1>
            <form onSubmit={handleSubmit}>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                placeholder="Enter password"
                autoFocus
                style={{
                  width: '100%',
                  padding: '12px',
                  border: '1px solid #d4b5a0',
                  borderRadius: '6px',
                  fontSize: '14px',
                  marginBottom: '12px',
                  boxSizing: 'border-box'
                }}
              />
              {error && <div style={{ color: '#c33', fontSize: '12px', marginBottom: '12px' }}>{error}</div>}
              <button
                type="submit"
                style={{
                  width: '100%',
                  padding: '12px',
                  background: '#6b4423',
                  color: 'white',
                  border: 'none',
                  borderRadius: '6px',
                  fontSize: '14px',
                  fontWeight: '600',
                  cursor: 'pointer'
                }}
              >
                Login
              </button>
            </form>
          </div>
        </div>
      );
    }

    // Chart components
    const LineChart = ({ data, lines }) => {
      const [hoveredMonth, setHoveredMonth] = React.useState(null);

      // Calculate min/max for all data points
      const allValues = [];
      lines.forEach(line => {
        data.forEach(d => {
          const val = parseFloat(d[line.key]) || 0;
          allValues.push(val);
        });
      });
      const maxVal = Math.max(...allValues, 0);
      const minVal = Math.min(...allValues, 0);
      const range = maxVal - minVal || 1;

      const lineLabels = { 'pl': 'Profit/Loss', 'cogs': 'COGS', 'opex': 'Operating Expenses', 'revenue': 'Revenue' };
      const lineColors = { 'pl': '#6b4423', 'cogs': '#a88968', 'opex': '#d4b5a0', 'revenue': '#4a90e2' };

      // Allocate space proportionally to positive and negative values
      const positiveRange = maxVal - 0;
      const negativeRange = 0 - minVal;

      // Allocate space proportionally based on actual ranges
      const chartHeight = 450; // y=50 to y=500
      const posPixels = (positiveRange / range) * chartHeight;
      const negPixels = (negativeRange / range) * chartHeight;

      // Zero line positioned to give most space to positive values
      const zeroY = 50 + posPixels;

      // Helper function to convert data value to Y position
      const getY = (val) => {
        if (val >= 0) {
          return zeroY - (val / positiveRange) * posPixels;
        } else {
          return zeroY + (Math.abs(val) / negativeRange) * negPixels;
        }
      };

      return (
        <div style={{ width: '100%' }}>
          <div style={{ display: 'flex', gap: '20px', marginBottom: '10px', flexWrap: 'wrap' }}>
            {lines.map(line => (
              <div key={line.key} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <div style={{ width: '12px', height: '12px', backgroundColor: line.color, borderRadius: '2px' }}></div>
                <span style={{ fontSize: '12px', color: '#666' }}>{lineLabels[line.key] || line.key}</span>
              </div>
            ))}
          </div>
          <svg width="100%" height="500" viewBox="0 0 800 500" style={{ border: '1px solid #eee' }}>
            {/* X-axis (at zero) */}
            <line x1="50" y1={zeroY} x2="750" y2={zeroY} stroke="#333" strokeWidth="2" />

            {/* Y-axis */}
            <line x1="50" y1="20" x2="50" y2="480" stroke="#333" strokeWidth="2" />

            {/* Grid and labels for positive side */}
            {[1, 2, 3, 4, 5].map(i => {
              const posVal = (i * positiveRange / 5);
              const posY = zeroY - (i * posPixels / 5);
              return posY > 50 ? (
                <g key={`pos-grid${i}`}>
                  <line x1="50" y1={posY} x2="750" y2={posY} stroke="#e0e0e0" strokeDasharray="4" />
                  <text x="40" y={posY + 4} textAnchor="end" fontSize="11" fill="#666">
                    ${(posVal / 1000).toFixed(0)}k
                  </text>
                </g>
              ) : null;
            })}

            {/* Grid and labels for negative side */}
            {[1, 2, 3].map(i => {
              const negVal = -(i * negativeRange / 3);
              const negY = zeroY + (i * negPixels / 3);
              return negY < 500 ? (
                <g key={`neg-grid${i}`}>
                  <line x1="50" y1={negY} x2="750" y2={negY} stroke="#e0e0e0" strokeDasharray="4" />
                  <text x="40" y={negY + 4} textAnchor="end" fontSize="11" fill="#666">
                    ${(negVal / 1000).toFixed(0)}k
                  </text>
                </g>
              ) : null;
            })}

            {/* Lines */}
            {lines.map((line, idx) => {
              const points = data.map((d, i) => {
                const x = 50 + (i * 700 / 11);
                const val = parseFloat(d[line.key]) || 0;
                const y = getY(val);
                return `${x},${y}`;
              }).join(' ');
              return (
                <g key={`line${idx}`}>
                  <polyline points={points} fill="none" stroke={line.color} strokeWidth="3" />
                  {/* Data points */}
                  {data.map((d, i) => {
                    const x = 50 + (i * 700 / 11);
                    const val = parseFloat(d[line.key]) || 0;
                    const y = getY(val);
                    return (
                      <circle key={`point${i}`} cx={x} cy={y} r="3" fill={line.color} />
                    );
                  })}
                </g>
              );
            })}

            {/* Month labels on X-axis */}
            {data.map((d, i) => (
              <text key={`label${i}`} x={50 + (i * 700 / 11)} y={zeroY + 20} textAnchor="middle"
                    fontSize="12" fill="#333" fontWeight="600">
                {d.month}
              </text>
            ))}

            {/* Hover zones and tooltips */}
            {data.map((d, filteredIdx) => {
              const dataIdx = filteredIdx;
              const numMonths = data.length;
              const x = 50 + (filteredIdx * 700 / (numMonths > 1 ? numMonths - 1 : 1));
              return (
                <g key={`hover${dataIdx}`}>
                  <rect x={x - 50} y="20" width="100" height="460" fill="transparent"
                        style={{ cursor: 'pointer', pointerEvents: 'all' }}
                        onMouseEnter={() => setHoveredMonth(dataIdx)}
                        onMouseLeave={() => setHoveredMonth(null)} />
                  {hoveredMonth === dataIdx && (
                    <g>
                      <line x1={x} y1="20" x2={x} y2={zeroY + 200} stroke="#ccc" strokeWidth="1" strokeDasharray="2" />
                      {lines.map((line, lidx) => {
                        const val = parseFloat(d[line.key]) || 0;
                        const y = getY(val);
                        const tooltipOffsetX = lidx % 2 === 0 ? -160 : 5;
                        const tooltipOffsetY = Math.floor(lidx / 2) * 45;
                        return (
                          <g key={`tooltip${lidx}`}>
                            <rect x={x + tooltipOffsetX} y={Math.max(25, y - 15 + tooltipOffsetY)} width="155" height="38"
                                  fill="white" stroke={line.color} strokeWidth="2" rx="4" />
                            <text x={x + tooltipOffsetX + 8} y={Math.max(35, y + 2 + tooltipOffsetY)} fontSize="11"
                                  fill={line.color} fontWeight="600">
                              {lineLabels[line.key]}
                            </text>
                            <text x={x + tooltipOffsetX + 8} y={Math.max(45, y + 13 + tooltipOffsetY)} fontSize="13"
                                  fill={line.color} fontWeight="700">
                              ${(val / 1000).toFixed(1)}k
                            </text>
                          </g>
                        );
                      })}
                    </g>
                  )}
                </g>
              );
            })}
          </svg>
        </div>
      );
    };

    const BarChart = ({ data, dataKey, color }) => {
      const values = data.map(d => parseFloat(d[dataKey]) || 0);
      const maxVal = Math.max(...values, 0);
      const minVal = Math.min(...values, 0);
      const range = maxVal - minVal || 1;

      // Allocate space proportionally based on actual ranges
      const positiveRange = maxVal - 0;
      const negativeRange = 0 - minVal;

      const chartHeight = 450; // y=50 to y=500
      const posPixels = (positiveRange / range) * chartHeight;
      const negPixels = (negativeRange / range) * chartHeight;

      // Zero line positioned to give most space to positive values
      const zeroY = 50 + posPixels;

      // Helper to convert value to Y position
      const getY = (val) => {
        if (val >= 0) {
          return zeroY - (val / positiveRange) * posPixels;
        } else {
          return zeroY + (Math.abs(val) / negativeRange) * negPixels;
        }
      };

      return (
        <div style={{ width: '100%', height: 500 }}>
          <svg width="100%" height="100%" viewBox="0 0 800 500">
            {/* X-axis (at zero) */}
            <line x1="50" y1={zeroY} x2="750" y2={zeroY} stroke="#333" strokeWidth="2" />

            {/* Y-axis */}
            <line x1="50" y1="20" x2="50" y2="480" stroke="#333" strokeWidth="2" />

            {/* Grid and labels for positive side */}
            {[1, 2, 3, 4, 5].map(i => {
              const posVal = (i * positiveRange / 5);
              const posY = zeroY - (i * posPixels / 5);
              return posY > 50 ? (
                <g key={`pos-grid${i}`}>
                  <line x1="50" y1={posY} x2="750" y2={posY} stroke="#e0e0e0" strokeDasharray="4" />
                  <text x="40" y={posY + 4} textAnchor="end" fontSize="11" fill="#666">
                    ${(posVal / 1000).toFixed(0)}k
                  </text>
                </g>
              ) : null;
            })}

            {/* Grid and labels for negative side */}
            {[1, 2, 3].map(i => {
              const negVal = -(i * negativeRange / 3);
              const negY = zeroY + (i * negPixels / 3);
              return negY < 500 ? (
                <g key={`neg-grid${i}`}>
                  <line x1="50" y1={negY} x2="750" y2={negY} stroke="#e0e0e0" strokeDasharray="4" />
                  <text x="40" y={negY + 4} textAnchor="end" fontSize="11" fill="#666">
                    ${(negVal / 1000).toFixed(0)}k
                  </text>
                </g>
              ) : null;
            })}

            {/* Bars */}
            {data.map((d, i) => {
              const x = 50 + (i * 700 / 12) + 20;
              const val = parseFloat(d[dataKey]) || 0;
              const y = getY(val);
              const displayVal = (val / 1000).toFixed(0) + 'k';
              return (
                <g key={`bar${i}`}>
                  <rect x={x} y={Math.min(y, zeroY)} width="40" height={Math.abs(y - zeroY)}
                        fill={val >= 0 ? color : '#d9534f'} opacity={0.8} />
                  <text x={x + 20} y={val >= 0 ? y - 8 : zeroY + 18} textAnchor="middle"
                        fontSize="11" fill={val >= 0 ? color : '#d9534f'} fontWeight="600">
                    {displayVal}
                  </text>
                </g>
              );
            })}

            {/* Month labels on X-axis */}
            {data.map((d, i) => (
              <text key={`label${i}`} x={50 + (i * 700 / 12) + 40} y={zeroY + 20}
                    textAnchor="middle" fontSize="12" fill="#333" fontWeight="600">
                {d.month}
              </text>
            ))}
          </svg>
        </div>
      );
    };

    function DashboardContent() {
      const [data, setData] = useState([]);
      const [selectedMonth, setSelectedMonth] = useState(0);
      const [selectedMetric, setSelectedMetric] = useState(null);
      const [error, setError] = useState('');
      const [dateRangeStart, setDateRangeStart] = useState(0);
      const [dateRangeEnd, setDateRangeEnd] = useState(11);

      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

      // Filter data based on selected date range
      const filteredData = data.slice(dateRangeStart, dateRangeEnd + 1);

      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async () => {
        try {
          const baseUrl = window.location.origin;
          const response = await fetch(`${baseUrl}/api/dashboard`);
          const result = await response.json();
          setData(result.monthlyData || []);
        } catch (err) {
          setError('Failed to load data: ' + err.message);
        }
      };

      const currentMonth = data[selectedMonth] || {};
      const metrics = currentMonth.pl ? [
        { label: 'Revenue', value: currentMonth.revenue, key: 'revenue' },
        { label: 'Profit/Loss', value: currentMonth.pl, key: 'pl' },
        { label: 'COGS', value: currentMonth.cogs, key: 'cogs' },
        { label: 'OPEX', value: currentMonth.opex, key: 'opex' },
      ] : [];

      return (
        <div className="container">
          <header>
            <h1>🍞 Bakery P/L Dashboard</h1>
            <p className="subtitle">Monthly Profit, Cost of Goods, and Operating Expenses</p>
          </header>

          {error && <div className="error">{error}</div>}

          <div className="controls">
            <div className="month-buttons">
              {months.map((m, i) => (
                <button
                  key={i}
                  onClick={() => setSelectedMonth(i)}
                  className={selectedMonth === i ? 'active' : ''}
                  style={{ opacity: i >= dateRangeStart && i <= dateRangeEnd ? 1 : 0.5 }}
                >
                  {m}
                </button>
              ))}
            </div>
          </div>

          <div className="metrics">
            {metrics.map((m) => (
              <div
                key={m.key}
                className={`metric-card ${selectedMetric === m.key ? 'active' : ''}`}
                onClick={() => setSelectedMetric(selectedMetric === m.key ? null : m.key)}
              >
                <div className="metric-label">{m.label}</div>
                <div className="metric-value">${(m.value / 1000).toFixed(1)}k</div>
              </div>
            ))}
          </div>

          <div style={{ marginBottom: '20px' }}>
            <label style={{ fontSize: '13px', color: '#666', marginRight: '10px', fontWeight: '600' }}>Timeframe:</label>
            <select value={dateRangeStart} onChange={(e) => setDateRangeStart(parseInt(e.target.value))}
                    style={{ padding: '6px', marginRight: '10px', borderRadius: '4px', border: '1px solid #ccc', fontSize: '12px' }}>
              {months.map((m, i) => (
                <option key={i} value={i}>From {m}</option>
              ))}
            </select>
            <select value={dateRangeEnd} onChange={(e) => setDateRangeEnd(parseInt(e.target.value))}
                    style={{ padding: '6px', borderRadius: '4px', border: '1px solid #ccc', fontSize: '12px' }}>
              {months.map((m, i) => (
                <option key={i} value={i}>To {m}</option>
              ))}
            </select>
          </div>

          <div className="chart-container">
            <div className="chart-title">
              {selectedMetric ? `${metrics.find(m => m.key === selectedMetric)?.label} by Month` : 'All Metrics by Month'}
            </div>
            {selectedMetric ? (
              <BarChart data={filteredData} dataKey={selectedMetric} color="#6b4423" />
            ) : (
              <LineChart data={filteredData} lines={[
                { key: 'revenue', color: '#4a90e2' },
                { key: 'pl', color: '#6b4423' },
                { key: 'cogs', color: '#a88968' },
                { key: 'opex', color: '#d4b5a0' },
              ]} />
            )}
          </div>
        </div>
      );
    }

    function BakeryDashboard() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);

      useEffect(() => {
        if (localStorage.getItem('bakery_auth') === 'true') {
          setIsAuthenticated(true);
        }
      }, []);

      if (!isAuthenticated) {
        return <LoginScreen onLogin={() => setIsAuthenticated(true)} />;
      }

      return <DashboardContent />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BakeryDashboard />);
  </script>
</body>
</html>
