<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakery Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.0/dist/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --series-cogs: #2a78d6;
      --series-opex: #1baf7a;
      --series-pl-good: #0ca30c;
      --series-pl-bad: #d03b3b;
      --chart-surface: #ffffff;
      --chart-ink: #0b0b0b;
      --chart-ink-secondary: #52514e;
      --chart-muted: #898781;
      --chart-grid: #e1e0d9;
      --chart-axis: #c3c2b7;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --series-cogs: #3987e5;
        --series-opex: #199e70;
        --series-pl-good: #0ca30c;
        --series-pl-bad: #d03b3b;
        --chart-surface: #2c2416;
        --chart-ink: #ffffff;
        --chart-ink-secondary: #c3c2b7;
        --chart-muted: #898781;
        --chart-grid: #3a3228;
        --chart-axis: #5a3a1e;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f1ed;
      color: #2c2416;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      margin-bottom: 40px;
    }

    h1 {
      font-size: 32px;
      color: #6b4423;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #8b6c57;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .view-toggle {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      color: #6b4423;
      border: 1px solid #d4b5a0;
    }

    button:hover {
      background: #e8ddd5;
      border-color: #6b4423;
    }

    button.active {
      background: #6b4423;
      color: white;
      border-color: #6b4423;
    }

    .file-upload {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="file"] {
      padding: 8px;
      border: 1px solid #d4b5a0;
      border-radius: 6px;
      background: white;
    }

    .upload-btn {
      padding: 10px 20px;
      background: #6b4423;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    .upload-btn:hover {
      background: #5a3a1e;
    }

    .chart-container {
      background: white;
      padding: 24px;
      border-radius: 8px;
      margin: 30px 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .chart-title {
      font-size: 16px;
      font-weight: 600;
      color: #6b4423;
      margin-bottom: 20px;
    }

    .chart-legend {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .chart-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--chart-ink-secondary);
    }

    .chart-legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 16px;
      border-radius: 6px;
      margin: 20px 0;
    }

    .success {
      background: #efe;
      color: #3c3;
      padding: 16px;
      border-radius: 6px;
      margin: 20px 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1614;
        color: #e8ddd5;
      }
      button {
        background: #2c2416;
        color: #e8b9a0;
        border-color: #5a3a1e;
      }
      button:hover {
        background: #3a3228;
      }
      .chart-container {
        background: #2c2416;
      }
      h1 {
        color: #e8b9a0;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DASHBOARD_PASSWORD = 'bakery123';

    function LoginScreen({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (password === DASHBOARD_PASSWORD) {
          onLogin();
        } else {
          setError('Incorrect password');
          setPassword('');
        }
      };

      return (
        <div style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          minHeight: '100vh',
          background: '#f5f1ed'
        }}>
          <div style={{
            background: 'white',
            padding: '40px',
            borderRadius: '12px',
            boxShadow: '0 4px 12px rgba(0,0,0,0.1)',
            width: '100%',
            maxWidth: '320px'
          }}>
            <h1 style={{ textAlign: 'center', color: '#6b4423', marginBottom: '30px', fontSize: '24px' }}>
              🍞 Bakery Dashboard
            </h1>
            <form onSubmit={handleSubmit}>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                placeholder="Enter password"
                autoFocus
                style={{
                  width: '100%',
                  padding: '12px',
                  border: '1px solid #d4b5a0',
                  borderRadius: '6px',
                  fontSize: '14px',
                  marginBottom: '12px',
                  boxSizing: 'border-box'
                }}
              />
              {error && <div style={{ color: '#c33', fontSize: '12px', marginBottom: '12px' }}>{error}</div>}
              <button
                type="submit"
                style={{
                  width: '100%',
                  padding: '12px',
                  background: '#6b4423',
                  color: 'white',
                  border: 'none',
                  borderRadius: '6px',
                  fontSize: '14px',
                  fontWeight: '600',
                  cursor: 'pointer'
                }}
              >
                Login
              </button>
            </form>
          </div>
        </div>
      );
    }

    // Fixed cost/profit breakdown: COGS + Operating Expenses + Profit/Loss sum to
    // (approximately) Revenue, so those three are what gets stacked — stacking
    // Revenue in as a fourth segment would double-count it.
    const COST_SERIES = [
      { key: 'cogs', label: 'COGS', color: 'var(--series-cogs)' },
      { key: 'opex', label: 'Operating Expenses', color: 'var(--series-opex)' },
    ];

    const formatDollars = (val) => `$${(val / 1000).toFixed(0)}k`;
    const formatDollarsPrecise = (val) => `$${Math.round(val).toLocaleString()}`;
    const formatPercent = (val) => `${val.toFixed(0)}%`;
    const formatPercentPrecise = (val) => `${val.toFixed(1)}%`;

    // Stacked bar chart: COGS and Operating Expenses stack up from zero, and
    // Profit/Loss either continues the stack upward (a profit) or forms its own
    // bar below zero (a loss) — colored green/red so a loss month is unmistakable.
    const StackedBarChart = ({ data, viewMode }) => {
      const [hoveredIdx, setHoveredIdx] = React.useState(null);

      const rawValue = (d, key) => parseFloat(d[key]) || 0;
      const scaled = (d, key) => {
        const raw = rawValue(d, key);
        if (viewMode === 'percent') {
          const revenue = rawValue(d, 'revenue');
          return revenue ? (raw / revenue) * 100 : 0;
        }
        return raw;
      };

      const stacks = data.map(d => {
        let posCum = 0;
        const segments = COST_SERIES.map(s => {
          const val = scaled(d, s.key);
          const start = posCum;
          posCum += val;
          return { ...s, val, start, end: posCum };
        });
        const pl = scaled(d, 'pl');
        if (pl >= 0) {
          segments.push({ key: 'pl', label: 'Profit', color: 'var(--series-pl-good)', val: pl, start: posCum, end: posCum + pl });
          posCum += pl;
        } else {
          segments.push({ key: 'pl', label: 'Loss', color: 'var(--series-pl-bad)', val: pl, start: 0, end: pl });
        }
        return { month: d.month, revenue: rawValue(d, 'revenue'), segments, posTotal: posCum, negTotal: Math.min(pl, 0) };
      });

      const maxVal = Math.max(...stacks.map(s => s.posTotal), 0);
      const minVal = Math.min(...stacks.map(s => s.negTotal), 0);
      const range = maxVal - minVal || 1;
      const positiveRange = maxVal || 1;
      const negativeRange = -minVal || 1;

      const chartHeight = 450; // y=50 to y=500
      const posPixels = (positiveRange / range) * chartHeight;
      const negPixels = (negativeRange / range) * chartHeight;
      const zeroY = 50 + posPixels;

      const getY = (val) => {
        if (val >= 0) {
          return zeroY - (val / positiveRange) * posPixels;
        }
        return zeroY + (Math.abs(val) / negativeRange) * negPixels;
      };

      const n = data.length || 1;
      const slotWidth = 700 / n;
      const barWidth = Math.max(6, Math.min(24, slotWidth - 12));
      const xCenter = (i) => 50 + slotWidth * i + slotWidth / 2;
      const gap = 2;

      const formatAxis = viewMode === 'percent' ? formatPercent : formatDollars;
      const formatTooltip = viewMode === 'percent' ? formatPercentPrecise : formatDollarsPrecise;

      const legendItems = [
        { label: 'COGS', color: 'var(--series-cogs)' },
        { label: 'Operating Expenses', color: 'var(--series-opex)' },
        { label: 'Profit', color: 'var(--series-pl-good)' },
        { label: 'Loss', color: 'var(--series-pl-bad)' },
      ];

      return (
        <div style={{ width: '100%' }}>
          <div className="chart-legend">
            {legendItems.map(item => (
              <div key={item.label} className="chart-legend-item">
                <div className="chart-legend-swatch" style={{ backgroundColor: item.color }}></div>
                <span>{item.label}</span>
              </div>
            ))}
          </div>
          <svg width="100%" height="500" viewBox="0 0 800 500">
            <line x1="50" y1={zeroY} x2="750" y2={zeroY} stroke="var(--chart-axis)" strokeWidth="2" />
            <line x1="50" y1="20" x2="50" y2="480" stroke="var(--chart-axis)" strokeWidth="2" />

            {[1, 2, 3, 4, 5].map(i => {
              const posVal = (i * positiveRange / 5);
              const posY = zeroY - (i * posPixels / 5);
              return posY > 50 ? (
                <g key={`pos-grid${i}`}>
                  <line x1="50" y1={posY} x2="750" y2={posY} stroke="var(--chart-grid)" strokeWidth="1" />
                  <text x="40" y={posY + 4} textAnchor="end" fontSize="11" fill="var(--chart-muted)">
                    {formatAxis(posVal)}
                  </text>
                </g>
              ) : null;
            })}

            {[1, 2, 3].map(i => {
              const negVal = -(i * negativeRange / 3);
              const negY = zeroY + (i * negPixels / 3);
              return negY < 500 && negativeRange > 0 ? (
                <g key={`neg-grid${i}`}>
                  <line x1="50" y1={negY} x2="750" y2={negY} stroke="var(--chart-grid)" strokeWidth="1" />
                  <text x="40" y={negY + 4} textAnchor="end" fontSize="11" fill="var(--chart-muted)">
                    {formatAxis(negVal)}
                  </text>
                </g>
              ) : null;
            })}

            {stacks.map((stack, i) => {
              const cx = xCenter(i);
              const left = cx - barWidth / 2;
              return (
                <g key={`bar${i}`}>
                  {stack.segments.map((seg, sidx) => {
                    if (seg.val === 0) return null;
                    const yStart = getY(seg.start);
                    const yEnd = getY(seg.end);
                    const top = Math.min(yStart, yEnd);
                    const rawHeight = Math.abs(yStart - yEnd);
                    const height = Math.max(0, rawHeight - gap);
                    const y = top + gap / 2;
                    const isOuterEnd =
                      (seg.val > 0 && seg.end === stack.posTotal && stack.posTotal > 0) ||
                      (seg.val < 0 && seg.end === stack.negTotal && stack.negTotal < 0);
                    return (
                      <rect
                        key={`seg${sidx}`}
                        x={left}
                        y={y}
                        width={barWidth}
                        height={height}
                        fill={seg.color}
                        rx={isOuterEnd ? 4 : 0}
                      />
                    );
                  })}
                  <rect
                    x={50 + i * slotWidth}
                    y="20"
                    width={slotWidth}
                    height="460"
                    fill="transparent"
                    style={{ cursor: 'pointer' }}
                    onMouseEnter={() => setHoveredIdx(i)}
                    onMouseLeave={() => setHoveredIdx(null)}
                  />
                </g>
              );
            })}

            {stacks.map((stack, i) => (
              <text key={`label${i}`} x={xCenter(i)} y={zeroY + 20} textAnchor="middle"
                    fontSize="12" fill="var(--chart-ink)" fontWeight="600">
                {stack.month}
              </text>
            ))}

            {stacks.map((stack, i) => {
              if (hoveredIdx !== i) return null;
              const cx = xCenter(i);
              const tooltipWidth = 190;
              const tooltipHeight = 44 + stack.segments.length * 20;
              const tooltipX = cx < 400 ? cx + 12 : cx - tooltipWidth - 12;
              const tooltipY = 30;
              return (
                <g key={`tooltip${i}`}>
                  <line x1={cx} y1="20" x2={cx} y2="480" stroke="var(--chart-grid)" strokeWidth="1" strokeDasharray="3" />
                  <rect x={tooltipX} y={tooltipY} width={tooltipWidth} height={tooltipHeight}
                        fill="var(--chart-surface)" stroke="var(--chart-grid)" strokeWidth="1" rx="6" />
                  <text x={tooltipX + 10} y={tooltipY + 18} fontSize="12" fontWeight="700" fill="var(--chart-ink)">
                    {stack.month} · Revenue {formatDollarsPrecise(stack.revenue)}
                  </text>
                  {stack.segments.map((seg, sidx) => (
                    <g key={`ttrow${sidx}`}>
                      <rect x={tooltipX + 10} y={tooltipY + 28 + sidx * 20} width="8" height="8" fill={seg.color} />
                      <text x={tooltipX + 24} y={tooltipY + 36 + sidx * 20} fontSize="11" fill="var(--chart-ink-secondary)">
                        {seg.label}
                      </text>
                      <text x={tooltipX + tooltipWidth - 10} y={tooltipY + 36 + sidx * 20} fontSize="11"
                            fontWeight="700" textAnchor="end" fill="var(--chart-ink)">
                        {formatTooltip(seg.val)}
                      </text>
                    </g>
                  ))}
                </g>
              );
            })}
          </svg>
        </div>
      );
    };

    function DashboardContent() {
      const [data, setData] = useState([]);
      const [error, setError] = useState('');
      const [dateRangeStart, setDateRangeStart] = useState(0);
      const [dateRangeEnd, setDateRangeEnd] = useState(11);
      const [viewMode, setViewMode] = useState('dollars');

      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

      // Filter data based on selected date range
      const filteredData = data.slice(dateRangeStart, dateRangeEnd + 1);

      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async () => {
        try {
          const baseUrl = window.location.origin;
          const response = await fetch(`${baseUrl}/api/dashboard`);
          const result = await response.json();
          setData(result.monthlyData || []);
        } catch (err) {
          setError('Failed to load data: ' + err.message);
        }
      };

      return (
        <div className="container">
          <header>
            <h1>🍞 Bakery Dashboard</h1>
            <p className="subtitle">Monthly Profit, Cost of Goods, and Operating Expenses</p>
          </header>

          {error && <div className="error">{error}</div>}

          <div className="controls">
            <div>
              <label style={{ fontSize: '13px', color: '#666', marginRight: '10px', fontWeight: '600' }}>Timeframe:</label>
              <select value={dateRangeStart} onChange={(e) => setDateRangeStart(parseInt(e.target.value))}
                      style={{ padding: '6px', marginRight: '10px', borderRadius: '4px', border: '1px solid #ccc', fontSize: '12px' }}>
                {months.map((m, i) => (
                  <option key={i} value={i}>From {m}</option>
                ))}
              </select>
              <select value={dateRangeEnd} onChange={(e) => setDateRangeEnd(parseInt(e.target.value))}
                      style={{ padding: '6px', borderRadius: '4px', border: '1px solid #ccc', fontSize: '12px' }}>
                {months.map((m, i) => (
                  <option key={i} value={i}>To {m}</option>
                ))}
              </select>
            </div>
            <div className="view-toggle">
              <button
                className={viewMode === 'dollars' ? 'active' : ''}
                onClick={() => setViewMode('dollars')}
              >
                Dollars
              </button>
              <button
                className={viewMode === 'percent' ? 'active' : ''}
                onClick={() => setViewMode('percent')}
              >
                % of Revenue
              </button>
            </div>
          </div>

          <div className="chart-container">
            <div className="chart-title">
              COGS, Operating Expenses & Profit/Loss by Month ({viewMode === 'percent' ? '% of Revenue' : '$'})
            </div>
            <StackedBarChart data={filteredData} viewMode={viewMode} />
          </div>
        </div>
      );
    }

    function BakeryDashboard() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);

      if (!isAuthenticated) {
        return <LoginScreen onLogin={() => setIsAuthenticated(true)} />;
      }

      return <DashboardContent />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BakeryDashboard />);
  </script>
</body>
</html>
