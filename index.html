<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakery Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.0/dist/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --series-cogs: #ff9500; --series-opex: #8b5cf6; --series-pl-good: #10b981; --series-pl-bad: #ef4444;
      --chart-surface: #ffffff; --chart-ink: #0b0b0b; --chart-ink-secondary: #52514e; --chart-muted: #898781;
      --chart-grid: #e1e0d9; --chart-axis: #000000;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f1ed; color: #2c2416; }
    .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
    header { margin-bottom: 40px; } h1 { font-size: 32px; color: #6b4423; margin-bottom: 10px; }
    .subtitle { color: #8b6c57; font-size: 14px; }
    .controls { display: flex; gap: 20px; margin: 30px 0; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .view-toggle { display: flex; gap: 8px; }
    .timeframe-controls { display: flex; gap: 8px; align-items: center; }
    .timeframe-controls select { padding: 8px 10px; border: 1px solid #d4b5a0; border-radius: 6px; background: white; color: #6b4423; font-size: 13px; font-weight: 500; cursor: pointer; }
    .timeframe-controls button { padding: 8px 14px; font-size: 15px; line-height: 1; }
    button { padding: 10px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; background: white; color: #6b4423; border: 1px solid #d4b5a0; }
    button:hover { background: #e8ddd5; border-color: #6b4423; }
    button:disabled { opacity: 0.4; cursor: not-allowed; background: white; border-color: #d4b5a0; }
    button.active { background: #6b4423; color: white; border-color: #6b4423; }
    input[type="file"] { padding: 8px; border: 1px solid #d4b5a0; border-radius: 6px; background: white; }
    .upload-btn { padding: 10px 20px; background: #6b4423; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .upload-btn:hover { background: #5a3a1e; }
    .chart-container { background: white; padding: 24px; border-radius: 8px; margin: 30px 0; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); }
    .chart-title { font-size: 16px; font-weight: 600; color: #6b4423; margin-bottom: 20px; }
    .chart-legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
    .chart-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--chart-ink-secondary); }
    .chart-legend-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
    .error { background: #fee; color: #c33; padding: 16px; border-radius: 6px; margin: 20px 0; }
    .loading { background: white; color: #8b6c57; padding: 24px; border-radius: 8px; margin: 20px 0; }
    .tabs { display: flex; gap: 12px; margin-bottom: 30px; border-bottom: 2px solid #d4b5a0; }
    .tab-button { padding: 12px 20px; background: transparent; border: none; border-bottom: 3px solid #6b4423; color: #6b4423; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: -2px; }
    .tab-button:hover { background: #f5f1ed; border-bottom-color: #6b4423; }
    .tab-button.active { border-bottom-color: #d4b5a0; color: #8b6c57; background: transparent; font-weight: 600; }
    .tab-content { display: none; } .tab-content.active { display: block; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 30px 0; }
    .metric-card { background: white; padding: 24px; border-radius: 8px; border-left: 4px solid #6b4423; }
    .metric-label { font-size: 12px; color: #8b6c57; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .metric-value { font-size: 28px; font-weight: 600; color: #6b4423; }
    .metric-sub { font-size: 12px; color: #8b6c57; margin-top: 4px; }
    .panel { background: white; padding: 24px; border-radius: 8px; margin: 30px 0; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); }
    .panel-title { font-size: 16px; font-weight: 600; color: #6b4423; margin-bottom: 6px; }
    .panel-hint { font-size: 12px; color: #8b6c57; margin-bottom: 20px; }
    .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #5a4a3a; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .swatch-base { background: #3f8361; } .swatch-bakery { background: #2b6cb0; } .swatch-nonbakery { background: #c05621; }
    .stacked-chart { display: flex; gap: 12px; }
    .chart-y-axis { position: relative; width: 56px; flex-shrink: 0; }
    .y-tick { position: absolute; right: 8px; transform: translateY(50%); font-size: 11px; color: #8b6c57; white-space: nowrap; }
    .chart-plot { position: relative; flex: 1; border-left: 1px solid #d4b5a0; border-bottom: 1px solid #d4b5a0; overflow-x: auto; overflow-y: visible; min-width: 0; }
    .gridline { position: absolute; left: 0; right: 0; border-top: 1px dashed #ece2d8; }
    .chart-bars { position: relative; display: flex; align-items: flex-end; gap: 28px; height: 100%; padding: 0 20px; min-width: max-content; }
    .bar-col-wrap { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
    .bar-col { width: 56px; display: flex; flex-direction: column; border-radius: 4px 4px 0 0; overflow: hidden; cursor: pointer; position: relative; }
    .bar-col.period-selected { outline: 2px solid #6b4423; outline-offset: 2px; }
    .seg { width: 100%; transition: filter 0.15s; }
    .bar-col:hover .seg { filter: brightness(1.1); }
    .seg-nonbakery { background: #c05621; } .seg-bakery { background: #2b6cb0; } .seg-base { background: #3f8361; }
    .seg-waste { background: var(--series-pl-bad); }
    .bar-x-label { margin-top: 8px; font-size: 12px; color: #6b4423; font-weight: 500; text-align: center; }
    .stack-tooltip { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); background: #2c2416; color: white; font-size: 12px; line-height: 1.6; padding: 10px 12px; border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 10; }
    .bar-row { display: grid; grid-template-columns: 180px 1fr 130px; align-items: center; gap: 12px; padding: 6px 0; }
    .bar-row-label { font-size: 13px; color: #2c2416; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { background: #f0e8e0; border-radius: 4px; height: 22px; position: relative; }
    .bar-fill { background: #6b4423; height: 100%; border-radius: 4px; min-width: 4px; transition: filter 0.15s; cursor: pointer; }
    .bar-fill:hover { filter: brightness(1.15); }
    .bar-row-value { font-size: 13px; font-weight: 600; color: #6b4423; }
    .bar-tooltip { position: absolute; background: #2c2416; color: white; font-size: 12px; padding: 8px 10px; border-radius: 6px; white-space: nowrap; pointer-events: none; transform: translateY(-115%); z-index: 10; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; color: #8b6c57; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; border-bottom: 2px solid #e8ddd5; }
    th.num, td.num { text-align: right; }
    td { padding: 12px; border-bottom: 1px solid #f0e8e0; }
    tr.fn-row { cursor: pointer; }
    tr.fn-row:hover { background: #faf6f2; }
    .category-tag { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
    .category-tag.bakery { background: #e3edf7; color: #2b6cb0; }
    .category-tag.non-bakery { background: #fbe8d9; color: #c05621; }
    .expand-icon { display: inline-block; width: 14px; color: #8b6c57; }
    .employee-detail { background: #faf6f2; }
    .employee-detail td { padding: 8px 12px 8px 40px; font-size: 12px; color: #5a4a3a; border-bottom: 1px solid #f0e8e0; }
    .empty { background: white; color: #8b6c57; padding: 24px; border-radius: 8px; margin: 20px 0; font-size: 14px; }
    .margin-bar-list { display: flex; flex-direction: column; gap: 8px; max-height: 640px; overflow-y: auto; padding-right: 4px; }
    .margin-bar-row { display: grid; grid-template-columns: 200px 1fr 150px; align-items: center; gap: 14px; }
    .margin-bar-label { font-size: 12px; color: var(--chart-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .margin-bar-track { position: relative; height: 14px; background: #f5f1ed; border: 1px solid #e8ddd5; border-radius: 4px; overflow: hidden; }
    .margin-bar-fill { position: absolute; top: 0; left: 0; height: 100%; min-width: 3px; background: var(--series-cogs); border-radius: 4px; }
    .margin-bar-refline { position: absolute; top: -1px; bottom: -1px; border-left: 1px dashed #a89a89; }
    .margin-bar-value { font-size: 12px; font-weight: 600; color: var(--chart-ink); text-align: right; white-space: nowrap; }
    .margin-bar-detail { display: block; font-size: 10px; font-weight: 400; color: var(--chart-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const DASHBOARD_PASSWORD = 'bakery123';
    function LoginScreen({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const handleSubmit = (e) => {
        e.preventDefault();
        if (password === DASHBOARD_PASSWORD) { onLogin(); }
        else { setError('Incorrect password'); setPassword(''); }
      };
      return (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: '#f5f1ed' }}>
          <div style={{ background: 'white', padding: '40px', borderRadius: '12px', boxShadow: '0 4px 12px rgba(0,0,0,0.1)', width: '100%', maxWidth: '320px' }}>
            <h1 style={{ textAlign: 'center', color: '#6b4423', marginBottom: '30px', fontSize: '24px' }}>🍞 Bakery Dashboard</h1>
            <form onSubmit={handleSubmit}>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Enter password" autoFocus style={{ width: '100%', padding: '12px', border: '1px solid #d4b5a0', borderRadius: '6px', fontSize: '14px', marginBottom: '12px', boxSizing: 'border-box' }} />
              {error && <div style={{ color: '#c33', fontSize: '12px', marginBottom: '12px' }}>{error}</div>}
              <button type="submit" style={{ width: '100%', padding: '12px', background: '#6b4423', color: 'white', border: 'none', borderRadius: '6px', fontSize: '14px', fontWeight: '600', cursor: 'pointer' }}>Login</button>
            </form>
          </div>
        </div>
      );
    }

    const COST_SERIES = [
      { key: 'cogs', label: 'COGS', color: 'var(--series-cogs)' },
      { key: 'opex', label: 'Operating Expenses', color: 'var(--series-opex)' },
    ];
    const formatDollars = (val) => `$${(val / 1000).toFixed(0)}k`;
    const formatDollarsPrecise = (val) => `$${Math.round(val).toLocaleString()}`;
    const formatPercent = (val) => `${Math.abs(val).toFixed(0)}%`;
    const formatPercentPrecise = (val) => `${Math.abs(val).toFixed(1)}%`;

    const StackedBarChart = ({ data, viewMode }) => {
      const [hoveredMonth, setHoveredMonth] = React.useState(null);
      const rawValue = (d, key) => parseFloat(d[key]) || 0;
      const scaled = (d, key) => {
        const raw = rawValue(d, key);
        if (viewMode === 'percent') {
          const revenue = rawValue(d, 'revenue');
          return revenue ? (raw / revenue) * 100 : 0;
        }
        return raw;
      };
      const points = data.map(d => {
        const revenue = scaled(d, 'revenue');
        const cogs = scaled(d, 'cogs');
        const opex = scaled(d, 'opex');
        const pl = scaled(d, 'pl');
        return { month: d.month, revenue, cogs, opex, pl };
      });

      // Independent line chart: each line scales independently
      const allValues = points.flatMap(p => [p.revenue, p.cogs, p.opex, p.pl]);
      const maxVal = Math.max(...allValues.filter(v => v >= 0), 1);
      const minVal = Math.min(...allValues.filter(v => v < 0), 0);
      const chartHeight = 400;
      const range = maxVal - minVal || 1;
      const n = data.length || 1;
      const slotWidth = 700 / n;
      const labelStride = Math.max(1, Math.ceil(n / 16));
      const xPos = (i) => 50 + slotWidth * i + slotWidth / 2;
      const getY = (val) => {
        const safeVal = isNaN(val) ? 0 : val;
        // Linear scale: maxVal at top (Y=50), minVal at bottom (Y=450)
        return 50 + ((maxVal - safeVal) / range) * chartHeight;
      };
      const zeroY = 50 + ((maxVal - 0) / range) * chartHeight;
      const formatAxis = viewMode === 'percent' ? formatPercent : formatDollars;

      const makePath = (key) => {
        return points.map((p, i) => `${xPos(i)},${getY(p[key])}`).join(' ');
      };

      const legendItems = [
        { label: 'Revenue', color: '#2a78d6' },
        { label: 'COGS', color: '#ff9500' },
        { label: 'Operating Expenses', color: '#8b5cf6' },
        { label: 'Profit/Loss', color: '#10b981' },
      ];

      return (
        <div style={{ width: '100%' }}>
          <div className="chart-legend">
            {legendItems.map(item => (
              <div key={item.label} className="chart-legend-item">
                <div className="chart-legend-swatch" style={{ backgroundColor: item.color }}></div>
                <span>{item.label}</span>
              </div>
            ))}
          </div>
          <svg width="100%" height="550" viewBox="0 0 800 550">
            <line x1="50" y1={zeroY} x2="750" y2={zeroY} stroke="var(--chart-axis)" strokeWidth="2" />
            <line x1="50" y1="50" x2="50" y2={50 + chartHeight} stroke="var(--chart-axis)" strokeWidth="2" />
            {[0, 1, 2, 3, 4, 5].map(i => {
              const y = 50 + (chartHeight / 5) * i;
              const val = maxVal - (range * i / 5);
              return (
                <g key={`grid${i}`}>
                  <line x1="50" y1={y} x2="750" y2={y} stroke="var(--chart-grid)" strokeWidth="1" />
                  <text x="40" y={y + 4} textAnchor="end" fontSize="11" fill="var(--chart-muted)">{formatAxis(val)}</text>
                </g>
              );
            })}
            <polyline points={makePath('revenue')} fill="none" stroke="#2a78d6" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
            <polyline points={makePath('cogs')} fill="none" stroke="#ff9500" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
            <polyline points={makePath('opex')} fill="none" stroke="#8b5cf6" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
            <polyline points={makePath('pl')} fill="none" stroke="#10b981" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
            {points.map((p, i) => (<circle key={`rev${i}`} cx={xPos(i)} cy={getY(p.revenue)} r="3" fill="#2a78d6" onMouseEnter={() => setHoveredMonth(i)} onMouseLeave={() => setHoveredMonth(null)} style={{ cursor: 'pointer' }} />))}
            {points.map((p, i) => (<circle key={`cogs${i}`} cx={xPos(i)} cy={getY(p.cogs)} r="3" fill="#ff9500" onMouseEnter={() => setHoveredMonth(i)} onMouseLeave={() => setHoveredMonth(null)} style={{ cursor: 'pointer' }} />))}
            {points.map((p, i) => (<circle key={`opex${i}`} cx={xPos(i)} cy={getY(p.opex)} r="3" fill="#8b5cf6" onMouseEnter={() => setHoveredMonth(i)} onMouseLeave={() => setHoveredMonth(null)} style={{ cursor: 'pointer' }} />))}
            {points.map((p, i) => (<circle key={`pl${i}`} cx={xPos(i)} cy={getY(p.pl)} r="3" fill="#10b981" onMouseEnter={() => setHoveredMonth(i)} onMouseLeave={() => setHoveredMonth(null)} style={{ cursor: 'pointer' }} />))}
            {points.map((p, i) => (i % labelStride === 0) && (<text key={`label${i}`} x={xPos(i)} y={50 + chartHeight + 20} textAnchor="middle" fontSize="12" fill="var(--chart-ink)" fontWeight="600">{p.month}</text>))}
            {hoveredMonth !== null && (
              (() => {
                const p = points[hoveredMonth];
                const cx = xPos(hoveredMonth);
                const tooltipWidth = 220;
                const tooltipHeight = 110;
                const tooltipX = cx < 400 ? cx + 12 : cx - tooltipWidth - 12;
                const tooltipY = 30;
                const format = viewMode === 'percent' ? formatPercentPrecise : formatDollarsPrecise;
                return (
                  <g key={`tooltip${hoveredMonth}`}>
                    <line x1={cx} y1="50" x2={cx} y2={50 + chartHeight} stroke="var(--chart-grid)" strokeWidth="1" strokeDasharray="3" />
                    <rect x={tooltipX} y={tooltipY} width={tooltipWidth} height={tooltipHeight} fill="var(--chart-surface)" stroke="var(--chart-grid)" strokeWidth="1" rx="6" />
                    <text x={tooltipX + 10} y={tooltipY + 18} fontSize="12" fontWeight="700" fill="var(--chart-ink)">{p.month}</text>
                    <text x={tooltipX + 10} y={tooltipY + 36} fontSize="11" fill="var(--chart-ink-secondary)">Revenue: {format(p.revenue)}</text>
                    <text x={tooltipX + 10} y={tooltipY + 54} fontSize="11" fill="var(--chart-ink-secondary)">COGS: {format(p.cogs)}</text>
                    <text x={tooltipX + 10} y={tooltipY + 72} fontSize="11" fill="var(--chart-ink-secondary)">OpEx: {format(p.opex)}</text>
                    <text x={tooltipX + 10} y={tooltipY + 90} fontSize="11" fill="var(--chart-ink-secondary)" fontWeight="600">{p.pl >= 0 ? 'Profit' : 'Loss'}: {format(Math.abs(p.pl))}</text>
                  </g>
                );
              })()
            )}
          </svg>
        </div>
      );
    };

    const WEEK_COUNT_OPTIONS = [
      { weeks: 8, label: '8 Weeks' },
      { weeks: 16, label: '16 Weeks' },
      { weeks: 26, label: '26 Weeks' },
      { weeks: 52, label: '52 Weeks' },
    ];

    // How wide a slice of history is shown on screen at once. The full 3 years is always fetched
    // and cached; these just window it client-side so panning back/forward is instant.
    const MARKET_TIMEFRAME_OPTIONS = [
      { weeks: 1, label: '1 Week' },
      { weeks: 2, label: '2 Weeks' },
      { weeks: 9, label: '2 Months' },
      { weeks: 26, label: '6 Months' },
      { weeks: 52, label: '1 Year' },
      { weeks: 156, label: '3 Years' },
    ];
    const MARKET_MAX_WEEKS = 156;

    function DashboardContent() {
      const [data, setData] = useState([]);
      const [error, setError] = useState('');
      const [periodSource, setPeriodSource] = useState('');
      const [viewMode, setViewMode] = useState('dollars');
      const [weeksRange, setWeeksRange] = useState(16);
      useEffect(() => { fetchData(); }, [weeksRange]);
      const fetchData = async () => {
        try {
          const baseUrl = window.location.origin;
          const response = await fetch(`${baseUrl}/api/dashboard?weeks=${weeksRange}`);
          const result = await response.json();
          setData((result.periodData || []).map(w => ({ ...w, month: w.label })));
          setPeriodSource(result.periodSource || '');
        } catch (err) {
          setError('Failed to load data: ' + err.message);
        }
      };
      return (
        <div className="container">
          <header>
            <h1>📊 P/L Dashboard</h1>
            <p className="subtitle">Profit, Cost of Goods, and Operating Expenses, every 2 weeks</p>
          </header>
          {error && <div className="error">{error}</div>}
          <div className="controls">
            <div className="view-toggle">
              {WEEK_COUNT_OPTIONS.map(opt => (
                <button key={opt.weeks} className={weeksRange === opt.weeks ? 'active' : ''} onClick={() => setWeeksRange(opt.weeks)}>{opt.label}</button>
              ))}
            </div>
            {data.length > 0 && (
              <div className="view-toggle">
                <button className={viewMode === 'dollars' ? 'active' : ''} onClick={() => setViewMode('dollars')}>Dollars</button>
                <button className={viewMode === 'percent' ? 'active' : ''} onClick={() => setViewMode('percent')}>% of Revenue</button>
              </div>
            )}
          </div>
          {!error && data.length === 0 && (
            <div className="empty">
              No P&amp;L data available ({periodSource || 'loading…'}). <a href="/api/quickbooks/connect">Connect QuickBooks</a> to populate this view - each period is two real weeks summed together, never averaged down from monthly totals.
            </div>
          )}
          {data.length > 0 && (
            <div className="chart-container">
              <div className="chart-title">COGS, Operating Expenses & Profit/Loss, every 2 weeks ({viewMode === 'percent' ? '% of Revenue' : '$'})</div>
              <StackedBarChart data={data} viewMode={viewMode} />
            </div>
          )}
        </div>
      );
    }

    const round2 = (n) => Math.round(n * 100) / 100;
    const fmtHours = (h) => `${h.toFixed(1)}h`;
    const fmtMoney = (v) => `$${v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    const fmtMoneyShort = (v) => { if (v >= 1000) return `$${Math.round(v / 1000).toLocaleString()}k`; return `$${Math.round(v)}`; };
    const fmtQty = (v) => v.toLocaleString(undefined, { maximumFractionDigits: 1 });
    const pct = (part, whole) => (whole > 0 ? `${((part / whole) * 100).toFixed(1)}%` : '0%');
    const fmtMonthLabel = (monthKey) => { const [y, m] = monthKey.split('-').map(Number); return new Date(y, m - 1, 1).toLocaleDateString(undefined, { month: 'short', year: 'numeric' }); };
    const fmtWeekLabel = (dateStr) => { const [y, m, d] = dateStr.split('-').map(Number); return new Date(y, m - 1, d).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); };
    const niceMax = (v) => { if (v <= 0) return 100; const magnitude = Math.pow(10, Math.floor(Math.log10(v))); const residual = v / magnitude; let niceResidual; if (residual <= 1) niceResidual = 1; else if (residual <= 2) niceResidual = 2; else if (residual <= 5) niceResidual = 5; else niceResidual = 10; return niceResidual * magnitude; };
    const BAKERY_FUNCTIONS = new Set(['Baker AM', 'Baker Night', 'Baker PM', 'LSK Cold Line', 'LSK Hot Line', 'LSK Prep Only', 'LSK-Arc BOH', 'Dishwasher/ Porter']);
    const classifyFunction = (name) => { if (BAKERY_FUNCTIONS.has(name)) return 'bakery'; if (/\bbaker\b|\bboh\b|\bprep\b|dishwash|porter|\bline\b|\bkitchen\b/i.test(name)) return 'bakery'; return 'non-bakery'; };
    function buildWeeklyData(weeks) {
      return weeks.map((w) => {
        const functions = (w.functions || []).map((f) => ({
          function: f.function, category: classifyFunction(f.function), regularHours: round2(f.regularHours || 0),
          otHours: round2(f.ot15Hours + f.ot2Hours || 0), ot15Hours: round2(f.ot15Hours || 0), ot2Hours: round2(f.ot2Hours || 0),
          regularWage: round2(f.regularWage || 0), otWage: round2(f.otWage || 0),
          employees: (f.employees || []).sort((a, b) => b.otWage - a.otWage).map((e) => ({ name: e.name, otHours: round2(e.otHours), otWage: round2(e.otWage) }))
        })).sort((a, b) => b.otWage - a.otWage);
        const totalWage = functions.reduce((s, f) => s + f.regularWage + f.otWage, 0);

    function buildMonthlyData(weeks) {

        const functions = [...m.functionTotals.values()].map((f) => ({ function: f.function, category: f.category, regularHours: round2(f.regularHours), otHours: round2(f.otHours), ot15Hours: round2(f.ot15Hours), ot2Hours: round2(f.ot2Hours), regularWage: round2(f.regularWage), otWage: round2(f.otWage), employees: [...f.employeeMap.values()].sort((a, b) => b.otWage - a.otWage).map((e) => ({ name: e.name, otHours: round2(e.otHours), otWage: round2(e.otWage) })) })).sort((a, b) => b.otWage - a.otWage);
        const totalWage = functions.reduce((s, f) => s + f.regularWage + f.otWage, 0);

          </div>

    // Aggregate item+day waste rows into day/week(Monday-start)/month buckets for the bar chart.
    const wastePeriodKey = (date, granularity) => {
      if (granularity === 'day') return date;
      if (granularity === 'month') return date.slice(0, 7);
      const d = new Date(`${date}T00:00:00Z`);
      const isoDow = (d.getUTCDay() + 6) % 7; // 0 = Monday
      d.setUTCDate(d.getUTCDate() - isoDow);
      return d.toISOString().slice(0, 10);
    };

    function buildWastePeriods(rows, granularity) {
      const map = new Map();
      rows.forEach((r) => {
        const key = wastePeriodKey(r.date, granularity);
        const entry = map.get(key) || { period: key, quantityProduced: 0, quantitySold: 0, waste: 0, producedValue: 0, soldValue: 0, wasteValue: 0 };
        entry.quantityProduced += r.quantityProduced;
        entry.quantitySold += r.quantitySold;
        entry.waste += r.waste;
        entry.producedValue += r.producedValue || 0;
        entry.soldValue += r.soldValue || 0;
        entry.wasteValue += r.wasteValue || 0;
        map.set(key, entry);
      });
      return [...map.values()].sort((a, b) => a.period.localeCompare(b.period));
    }

    function buildWasteByItem(rows) {
      const map = new Map();
      rows.forEach((r) => {
        const entry = map.get(r.item) || { item: r.item, quantityProduced: 0, quantitySold: 0, waste: 0, ordered: null };
        entry.quantityProduced += r.quantityProduced;
        entry.quantitySold += r.quantitySold;
        entry.waste += r.waste;
        if (r.ordered != null) entry.ordered = (entry.ordered || 0) + r.ordered;
        map.set(r.item, entry);
      });
      return [...map.values()].sort((a, b) => b.waste - a.waste);
    }

    const fmtPeriodLabel = (period, granularity) => {
      if (granularity === 'month') { const [y, m] = period.split('-').map(Number); return new Date(y, m - 1, 1).toLocaleDateString(undefined, { month: 'short', year: 'numeric' }); }
      return new Date(`${period}T00:00:00Z`).toLocaleDateString(undefined, { month: 'short', day: 'numeric', timeZone: 'UTC' });
    };

    function WasteBarChart({ periods, granularity, selectedPeriod, onSelectPeriod }) {
      // `hovered` carries the hovered bar's viewport rect so the tooltip can be portaled to
      // document.body and positioned with `position: fixed` - it used to be an absolutely-positioned
      // child of .chart-plot, which sets `overflow-x: auto`. Per the CSS spec, a non-visible
      // overflow-x forces the paired overflow-y to compute as auto too (not visible, no matter what's
      // written), so the tooltip could get silently clipped/hidden by that container's own edges.
      const [hovered, setHovered] = useState(null);
      const maxWasteValue = niceMax(Math.max(...periods.map((p) => p.wasteValue), 0) * 1.15);
      const tickCount = 5;
      const ticks = Array.from({ length: tickCount }, (_, i) => (maxWasteValue / (tickCount - 1)) * i);
      return (
        <div className="stacked-chart">
          <div className="chart-y-axis" style={{ height: CHART_HEIGHT }}>
            {ticks.map((t) => (<div key={t} className="y-tick" style={{ bottom: `${(t / maxWasteValue) * CHART_HEIGHT}px` }}>{fmtMoneyShort(t)}</div>))}
          </div>
          <div className="chart-plot" style={{ height: CHART_HEIGHT }}>
            {ticks.map((t) => (<div key={t} className="gridline" style={{ bottom: `${(t / maxWasteValue) * CHART_HEIGHT}px` }} />))}
            <div className="chart-bars">
              {periods.map((p) => {
                const barPx = maxWasteValue > 0 ? (p.wasteValue / maxWasteValue) * CHART_HEIGHT : 0;
                const isSelected = p.period === selectedPeriod;
                return (
                  <div className="bar-col-wrap" key={p.period}>
                    <div
                      className={`bar-col${isSelected ? ' period-selected' : ''}`}
                      style={{ height: `${Math.max(barPx, 2)}px` }}
                      onMouseEnter={(e) => setHovered({ period: p, rect: e.currentTarget.getBoundingClientRect() })}
                      onMouseLeave={() => setHovered(null)}
                      onClick={() => onSelectPeriod(p.period)}
                    >
                      <div className="seg seg-waste" style={{ height: '100%' }} />
                    </div>
                    <div className="bar-x-label">{fmtPeriodLabel(p.period, granularity)}</div>
                  </div>
                );
              })}
            </div>
          </div>
          {hovered && ReactDOM.createPortal(
            <div
              className="stack-tooltip"
              style={{ position: 'fixed', top: `${hovered.rect.top - 10}px`, left: `${hovered.rect.left + hovered.rect.width / 2}px`, bottom: 'auto', transform: 'translate(-50%, -100%)' }}
            >
              <strong>{fmtPeriodLabel(hovered.period.period, granularity)}</strong><br />
              Produced: {fmtMoney(hovered.period.producedValue)}<br />
              Sold: {fmtMoney(hovered.period.soldValue)}<br />
              Waste: {fmtMoney(hovered.period.wasteValue)} ({pct(hovered.period.waste, hovered.period.quantityProduced)})
            </div>,
            document.body
          )}
        </div>
      );
    }

        fetch(`${baseUrl}/api/waste/locations`)
          .then((r) => r.json())
          .then((result) => {
            const stores = result.stores || [];
            const markets = result.markets || [];
            setLocationOptions({ stores, markets });
            setLocation(stores[0] || markets[0] || '');
          })
          .catch((err) => { setError('Failed to load locations: ' + err.message); setStatus('error'); });
      }, []);

      const fetchData = async (loc) => {
        try {
          setStatus('loading');
          setError('');
          const baseUrl = window.location.origin;
          const response = await fetch(`${baseUrl}/api/waste?location=${encodeURIComponent(loc)}`);
          const result = await response.json();
          if (result.error) { setError(result.error); setStatus('error'); return; }
          setWasteData(result);
          setStatus(result.status || (result.rows && result.rows.length ? 'ready' : 'empty'));
        } catch (err) {
          setError('Failed to load data: ' + err.message);
          setStatus('error');
        }
      };

      useEffect(() => { if (location) fetchData(location); }, [location]);

      const currentOptions = filterType === 'location' ? locationOptions.stores : locationOptions.markets;
      const handleFilterTypeChange = (type) => {
        setFilterType(type);
        const opts = type === 'location' ? locationOptions.stores : locationOptions.markets;
        setLocation(opts[0] || '');
      };

      const rows = (wasteData && wasteData.rows) || [];
      const periods = buildWastePeriods(rows, granularity);
      const effectivePeriod = selectedPeriod || (periods.length ? periods[periods.length - 1].period : null);
      const periodRows = effectivePeriod ? rows.filter((r) => wastePeriodKey(r.date, granularity) === effectivePeriod) : rows;
      const items = buildWasteByItem(periodRows);
      const totals = wasteData && wasteData.totals;
      const unmatched = ((wasteData && wasteData.unmatchedSoldItems) || []).slice(0, 10);

      return (
        <div className="container">
          <header style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '16px' }}>
            <div>
              <h1>🗑️ Waste</h1>
              <p className="subtitle">Produced (uploaded CSV) vs. sold (live from Square), by item and location</p>
            </div>
            <div style={{ display: 'flex', gap: '8px' }}>
              <button className={granularity === 'day' ? 'active' : ''} onClick={() => setGranularity('day')}>Daily</button>
              <button className={granularity === 'week' ? 'active' : ''} onClick={() => setGranularity('week')}>Weekly</button>
              <button className={granularity === 'month' ? 'active' : ''} onClick={() => setGranularity('month')}>Monthly</button>
            </div>
          </header>
          <div className="controls">
            <div style={{ display: 'flex', gap: '15px', alignItems: 'center' }}>
              <div>
                <label style={{ fontSize: '13px', color: '#666', marginRight: '8px', fontWeight: '600' }}>Filter:</label>
                <select value={filterType} onChange={(e) => handleFilterTypeChange(e.target.value)} style={{ padding: '6px', marginRight: '10px', borderRadius: '4px', border: '1px solid #ccc', fontSize: '12px' }}>
                  <option value="location">By Location</option>
                  <option value="market">By Market</option>
                </select>
              </div>
              <div>
                <label style={{ fontSize: '13px', color: '#666', marginRight: '8px', fontWeight: '600' }}>Selection:</label>
                <select value={location} onChange={(e) => setLocation(e.target.value)} style={{ padding: '6px', borderRadius: '4px', border: '1px solid #ccc', fontSize: '12px' }}>
                  {currentOptions.map((opt) => (<option key={opt} value={opt}>{opt}</option>))}
                </select>
              </div>
            </div>
          </div>
          {error && <div className="error">{error}</div>}
          {status === 'loading' && <div className="loading">Loading production &amp; Square sales data…</div>}
          {status === 'empty' && <div className="empty">No production data uploaded yet for {location}. Send the production CSV and I'll load it in.</div>}
          {status === 'ready' && totals && (
            <>
              <div className="metrics">
                <div className="metric-card">
                  <div className="metric-label">Produced</div>
                  <div className="metric-value">{fmtQty(totals.quantityProduced)}</div>
                  <div className="metric-sub">{wasteData.start} to {wasteData.end}</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Sold</div>
                  <div className="metric-value">{fmtQty(totals.quantitySold)}</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Waste</div>
                  <div className="metric-value" style={{ color: '#d03b3b' }}>{fmtQty(totals.waste)}</div>
                  <div className="metric-sub">{totals.wastePct}% of production</div>
                </div>
              </div>
              <div className="chart-container">
                <div className="chart-title">Waste by {granularity === 'day' ? 'Day' : granularity === 'week' ? 'Week' : 'Month'}</div>
                <div className="panel-hint">Click a bar to see that {granularity}'s breakdown in the table below.</div>
                <WasteBarChart periods={periods} granularity={granularity} selectedPeriod={effectivePeriod} onSelectPeriod={setSelectedPeriod} />
              </div>
              <div className="panel">
                <div className="panel-title">Order Fulfillment by Item {effectivePeriod ? `— ${fmtPeriodLabel(effectivePeriod, granularity)}` : ''}</div>
                <div className="panel-hint">Ordered vs. received (produced) vs. left over, for items uploaded with an Ordered quantity. Shows N/A where no Ordered quantity was tracked for that item.</div>
                <table>
                  <thead><tr><th>Item</th><th className="num">Ordered</th><th className="num">Received</th><th className="num">Left Over</th><th className="num">Fulfillment %</th><th className="num">Waste %</th></tr></thead>
                  <tbody>
                    {items.map((it) => (
                      <tr key={it.item}>
                        <td>{it.item}</td>
                        <td className="num">{it.ordered != null ? fmtQty(it.ordered) : 'N/A'}</td>
                        <td className="num">{fmtQty(it.quantityProduced)}</td>
                        <td className="num">{fmtQty(it.waste)}</td>
                        <td className="num">{it.ordered != null ? pct(it.quantityProduced, it.ordered) : 'N/A'}</td>
                        <td className="num">{pct(it.waste, it.quantityProduced)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {unmatched.length > 0 && (
                <div className="panel">
                  <div className="panel-title">Possible naming mismatches</div>
                  <div className="panel-hint">These sold at {location} in this range but don't match any uploaded production item by name — often a Square point-of-sale name vs. CSV name difference. Rename the CSV item to match if it should be tracked.</div>
                  <table>
                    <thead><tr><th>Square item name</th><th className="num">Sold</th></tr></thead>
                    <tbody>
                      {unmatched.map((u) => (<tr key={u.item}><td>{u.item}</td><td className="num">{fmtQty(u.quantitySold)}</td></tr>))}
                    </tbody>
                  </table>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // A fixed 8-hue categorical palette (see color-formula guidance) tops out around 8
    // reliably-distinguishable series - past that, any generated hue starts landing close to an
    // existing one under colorblind simulation. With up to ~50 markets there's no way around that
    // math, so this generates one color per market anyway (by explicit request) using golden-angle
    // hue rotation for maximum spread, but the checklist (name + swatch + revenue) and the hover
    // tooltip (exact name + value) stay the real way to tell markets apart - never color alone.
    const marketColor = (index) => {
      const hue = (index * 137.508) % 360;
      const sat = 62 + (index % 3) * 10;
      const light = 38 + ((index * 2 + 1) % 3) * 6;
      return `hsl(${hue.toFixed(1)}, ${sat}%, ${light}%)`;
    };

    function MarketLineChart({ weekStarts, series, colorOf }) {
      const [hoverIndex, setHoverIndex] = useState(null);
      const chartHeight = 400;
      const plotLeft = 60, plotRight = 960, plotTop = 20, plotBottom = chartHeight + 20;
      const n = weekStarts.length || 1;
      const xPos = (i) => plotLeft + ((plotRight - plotLeft) * i) / Math.max(n - 1, 1);
      const maxVal = Math.max(1, ...series.flatMap(s => s.revenue));
      const niceMax = (v) => { const magnitude = Math.pow(10, Math.floor(Math.log10(v))); const residual = v / magnitude; let niceResidual; if (residual <= 1) niceResidual = 1; else if (residual <= 2) niceResidual = 2; else if (residual <= 5) niceResidual = 5; else niceResidual = 10; return niceResidual * magnitude; };
      const chartMax = niceMax(maxVal * 1.1);
      const getY = (val) => plotBottom - (val / chartMax) * (plotBottom - plotTop);
      const labelStride = Math.max(1, Math.ceil(n / 16));

      const handleMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const scale = 1000 / rect.width;
        const svgX = (e.clientX - rect.left) * scale;
        const idx = Math.round(((svgX - plotLeft) / (plotRight - plotLeft)) * (n - 1));
        setHoverIndex(Math.min(Math.max(idx, 0), n - 1));
      };

      return (
        <svg width="100%" height="500" viewBox="0 0 1000 500" style={{ overflow: 'visible' }} onMouseMove={handleMove} onMouseLeave={() => setHoverIndex(null)}>
          <line x1={plotLeft} y1={plotBottom} x2={plotRight} y2={plotBottom} stroke="var(--chart-axis)" strokeWidth="2" />
          <line x1={plotLeft} y1={plotTop} x2={plotLeft} y2={plotBottom} stroke="var(--chart-axis)" strokeWidth="2" />
          {[0, 1, 2, 3, 4, 5].map(i => {
            const val = (i * chartMax) / 5;
            const y = plotBottom - (i * (plotBottom - plotTop)) / 5;
            return (
              <g key={`grid${i}`}>
                <line x1={plotLeft} y1={y} x2={plotRight} y2={y} stroke="var(--chart-grid)" strokeWidth="1" />
                <text x={plotLeft - 10} y={y + 4} textAnchor="end" fontSize="11" fill="var(--chart-muted)">${(val / 1000).toFixed(0)}k</text>
              </g>
            );
          })}
          {weekStarts.map((ws, i) => (i % labelStride === 0) && (
            <text key={`xlabel${i}`} x={xPos(i)} y={plotBottom + 20} textAnchor="middle" fontSize="11" fill="var(--chart-ink)" fontWeight="600">{fmtWeekLabel(ws)}</text>
          ))}
          {series.map(s => (
            <polyline key={s.name} points={s.revenue.map((v, i) => `${xPos(i)},${getY(v)}`).join(' ')}
              fill="none" stroke={colorOf(s.name)} strokeWidth="2" vectorEffect="non-scaling-stroke" />
          ))}
          {n <= 14 && series.map(s => s.revenue.map((v, i) => (
            <circle key={`${s.name}-${i}`} cx={xPos(i)} cy={getY(v)} r="3" fill={colorOf(s.name)} />
          )))}
          {hoverIndex !== null && (
            <line x1={xPos(hoverIndex)} y1={plotTop} x2={xPos(hoverIndex)} y2={plotBottom} stroke="var(--chart-grid)" strokeWidth="1" strokeDasharray="3" />
          )}
          {hoverIndex !== null && (() => {
            const rows = series.map(s => ({ name: s.name, value: s.revenue[hoverIndex], color: colorOf(s.name) })).sort((a, b) => b.value - a.value);
            const shown = rows.slice(0, 12);
            const cx = xPos(hoverIndex);
            const tooltipWidth = 220;
            const tooltipHeight = 30 + shown.length * 18 + (rows.length > 12 ? 18 : 0);
            const tooltipX = cx < 500 ? cx + 12 : cx - tooltipWidth - 12;
            const tooltipY = 30;
            return (
              <g>
                <rect x={tooltipX} y={tooltipY} width={tooltipWidth} height={tooltipHeight} fill="var(--chart-surface)" stroke="var(--chart-grid)" strokeWidth="1" rx="6" />
                <text x={tooltipX + 10} y={tooltipY + 18} fontSize="12" fontWeight="700" fill="var(--chart-ink)">{fmtWeekLabel(weekStarts[hoverIndex])}</text>
                {shown.map((r, i) => (
                  <g key={r.name}>
                    <line x1={tooltipX + 10} y1={tooltipY + 34 + i * 18} x2={tooltipX + 24} y2={tooltipY + 34 + i * 18} stroke={r.color} strokeWidth="3" />
                    <text x={tooltipX + 30} y={tooltipY + 38 + i * 18} fontSize="11" fill="var(--chart-ink-secondary)">{r.name}: <tspan fontWeight="700" fill="var(--chart-ink)">${r.value.toLocaleString(undefined, { maximumFractionDigits: 0 })}</tspan></text>
                  </g>
                ))}
                {rows.length > 12 && (
                  <text x={tooltipX + 10} y={tooltipY + 34 + shown.length * 18} fontSize="10" fill="var(--chart-muted)">+{rows.length - 12} more selected</text>
                )}
              </g>
            );
          })()}
        </svg>
      );
    }

    const MARKET_TOP_N_OPTIONS = [5, 8, 10, 15, 20, 25];

    function MarketSelectMenu({ markets, selected, setSelected, colorOf, totalRevenue }) {
      const [open, setOpen] = useState(false);
      const [topN, setTopN] = useState(8);
      const menuRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (menuRef.current && !menuRef.current.contains(e.target)) setOpen(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const toggle = (name) => {
        setSelected(prev => {
          const next = new Set(prev);
          if (next.has(name)) next.delete(name); else next.add(name);
          return next;
        });
      };

      return (
        <div ref={menuRef} style={{ position: 'relative', display: 'inline-block' }}>
          <button onClick={() => setOpen(o => !o)}>Select Markets ({selected.size}) {open ? '▴' : '▾'}</button>
          {open && (
            <div style={{ position: 'absolute', top: '100%', right: 0, marginTop: '4px', width: '340px', maxWidth: '90vw', maxHeight: '440px', overflowY: 'auto', background: 'var(--chart-surface)', border: '1px solid var(--chart-grid)', borderRadius: '8px', boxShadow: '0 4px 16px rgba(0,0,0,0.15)', zIndex: 20, padding: '10px' }}>
              <div style={{ display: 'flex', gap: '6px', alignItems: 'center', flexWrap: 'wrap', marginBottom: '8px', paddingBottom: '8px', borderBottom: '1px solid var(--chart-grid)' }}>
                <button onClick={() => setSelected(new Set(markets.map(m => m.name)))}>Select All</button>
                <button onClick={() => setSelected(new Set())}>Select None</button>
                <label style={{ display: 'flex', alignItems: 'center', gap: '4px', fontSize: '13px', color: 'var(--chart-ink)', marginLeft: 'auto' }}>
                  Top
                  <select value={topN} onChange={(e) => { const n = parseInt(e.target.value, 10); setTopN(n); setSelected(new Set(markets.slice(0, n).map(m => m.name))); }}>
                    {MARKET_TOP_N_OPTIONS.map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </label>
              </div>
              {markets.map(m => (
                <label key={m.name} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '4px 0', cursor: 'pointer', fontSize: '13px' }}>
                  <input type="checkbox" checked={selected.has(m.name)} onChange={() => toggle(m.name)} />
                  <span style={{ width: '10px', height: '10px', borderRadius: '2px', background: colorOf(m.name), flexShrink: 0 }}></span>
                  <span style={{ flex: 1, color: 'var(--chart-ink)' }}>{m.name}</span>
                  <span style={{ color: 'var(--chart-ink-secondary)' }}>{fmtMoneyShort(totalRevenue(m))}</span>
                </label>
              ))}
            </div>
          )}
        </div>
      );
    }

    const fmtWeekLabelFull = (dateStr) => { const [y, m, d] = dateStr.split('-').map(Number); return new Date(y, m - 1, d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); };

    function MarketPerformanceDashboard() {
      // Full 3-year dataset, fetched once. weekStarts is oldest-first; each market's revenue[] is
      // aligned to it. The visible window (below) is sliced out of this client-side.
      const [allWeekStarts, setAllWeekStarts] = useState([]);
      const [allMarkets, setAllMarkets] = useState([]);
      const [selected, setSelected] = useState(new Set());
      const [status, setStatus] = useState('loading');
      const [error, setError] = useState('');
      // windowWeeks = how many weeks are shown on screen. offsetWeeks = how far back from the most
      // recent week the right edge sits (0 = showing through the current week).
      const [windowWeeks, setWindowWeeks] = useState(26);
      const [offsetWeeks, setOffsetWeeks] = useState(0);

      useEffect(() => { fetchData(); }, []);
      const fetchData = async () => {
        try {
          setStatus('loading');
          const baseUrl = window.location.origin;
          const response = await fetch(`${baseUrl}/api/market-performance?weeks=${MARKET_MAX_WEEKS}`);
          const result = await response.json();
          if (result.error) { setError(result.message || result.error); setStatus('error'); return; }
          setAllWeekStarts(result.weekStarts || []);
          setAllMarkets(result.markets || []);
          setSelected(new Set((result.markets || []).slice(0, 8).map(m => m.name)));
          setStatus((result.markets || []).length > 0 ? 'ready' : 'empty');
        } catch (err) {
          setError('Failed to load data: ' + err.message);
          setStatus('error');
        }
      };

      // Slice the visible window out of the full dataset.
      const total = allWeekStarts.length;
      const maxOffset = Math.max(0, total - windowWeeks);
      const clampedOffset = Math.min(offsetWeeks, maxOffset);
      const end = total - clampedOffset;
      const start = Math.max(0, end - windowWeeks);
      const weekStarts = allWeekStarts.slice(start, end);
      const markets = allMarkets.map(m => ({ name: m.name, revenue: m.revenue.slice(start, end) }));

      const step = windowWeeks;
      const goOlder = () => setOffsetWeeks(o => Math.min(maxOffset, o + step));
      const goNewer = () => setOffsetWeeks(o => Math.max(0, o - step));
      const changeTimeframe = (weeks) => { setWindowWeeks(weeks); setOffsetWeeks(0); };

      // Markets keep the server's stable full-range ranking (so colors don't reshuffle when you
      // pan); totals in the picker reflect the visible window.
      const colorOf = (name) => {
        const idx = markets.findIndex(m => m.name === name);
        return marketColor(idx >= 0 ? idx : 0);
      };
      const totalRevenue = (m) => m.revenue.reduce((s, v) => s + v, 0);
      const visibleSeries = markets.filter(m => selected.has(m.name));
      const rangeLabel = weekStarts.length ? `${fmtWeekLabelFull(weekStarts[0])} – ${fmtWeekLabelFull(weekStarts[weekStarts.length - 1])}` : '';

      return (
        <div className="container">
          <header>
            <h1>🏪 Performance by Market</h1>
            <p className="subtitle">Weekly revenue by farmers market / pop-up location{rangeLabel ? ` · ${rangeLabel}` : ''}</p>
          </header>
          <div className="controls">
            <div className="timeframe-controls">
              <button onClick={goOlder} disabled={status !== 'ready' || clampedOffset >= maxOffset} title="Earlier">◀</button>
              <label style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '13px', color: 'var(--chart-ink)' }}>
                Show
                <select value={windowWeeks} onChange={(e) => changeTimeframe(parseInt(e.target.value, 10))}>
                  {MARKET_TIMEFRAME_OPTIONS.map(opt => <option key={opt.weeks} value={opt.weeks}>{opt.label}</option>)}
                </select>
              </label>
              <button onClick={goNewer} disabled={status !== 'ready' || clampedOffset <= 0} title="Later">▶</button>
            </div>
            {status === 'ready' && (
              <MarketSelectMenu markets={markets} selected={selected} setSelected={setSelected} colorOf={colorOf} totalRevenue={totalRevenue} />
            )}
          </div>
          {status === 'loading' && <div className="loading">Loading market sales data from Square… the first load can take several minutes (up to 3 years of history across ~50 locations); results are cached after that.</div>}
          {status === 'error' && <div className="error">{error}</div>}
          {status === 'empty' && <div className="empty">No market sales data available.</div>}
          {status === 'ready' && (
            <div className="chart-container">
              <div className="chart-title">Weekly Revenue by Market ({selected.size} of {markets.length} selected)</div>
              <MarketLineChart weekStarts={weekStarts} series={visibleSeries} colorOf={colorOf} />
            </div>
          )}
        </div>
      );
    }

    // (The old "Item Margins" tab — recipe Cost/Yield vs Square catalog price — was removed here.
    //  It's superseded by the Product Margins tab below, which costs recipes bottom-up from
    //  Chef's Warehouse invoices and weights by real Square volume.)

    const MARGIN_WEEK_OPTIONS = [
      { weeks: 4, label: '4 Weeks' }, { weeks: 8, label: '8 Weeks' },
      { weeks: 12, label: '12 Weeks' }, { weeks: 26, label: '26 Weeks' }, { weeks: 52, label: '52 Weeks (12mo)' },
    ];

    function MarginScatterChart({ points }) {
      const [hover, setHover] = useState(null);
      const W = 1000, H = 540;
      const plotLeft = 72, plotRight = 940, plotTop = 30, plotBottom = 452;
      const vols = points.map(p => p.volume);
      const margins = points.map(p => p.marginPct);
      const revs = points.map(p => p.revenue);
      const volMax = Math.max(1, ...vols) * 1.08;
      const marginMax = Math.min(100, Math.max(10, Math.ceil((Math.max(...margins, 0) + 5) / 10) * 10));
      const marginMin = Math.min(60, Math.floor((Math.min(...margins, 60)) / 10) * 10);
      const xPos = (m) => plotLeft + ((m - marginMin) / (marginMax - marginMin || 1)) * (plotRight - plotLeft);
      const yPos = (v) => plotBottom - (v / volMax) * (plotBottom - plotTop);
      const rMin = Math.min(...revs), rMax = Math.max(...revs);
      const radius = (r) => (rMax <= rMin ? 12 : 7 + 16 * Math.sqrt((r - rMin) / (rMax - rMin)));
      const median = (arr) => { const s = [...arr].sort((a, b) => a - b); const m = Math.floor(s.length / 2); return s.length ? (s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2) : 0; };
      const medVolume = median(vols), medMargin = median(margins);
      const midY = (plotTop + plotBottom) / 2;

      return (
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} onMouseLeave={() => setHover(null)}>
          <line x1={plotLeft} y1={plotBottom} x2={plotRight} y2={plotBottom} stroke="var(--chart-axis)" strokeWidth="2" />
          <line x1={plotLeft} y1={plotTop} x2={plotLeft} y2={plotBottom} stroke="var(--chart-axis)" strokeWidth="2" />
          {[0, 1, 2, 3, 4, 5].map(i => { const v = (i * volMax) / 5; const y = yPos(v); return (
            <g key={`y${i}`}>
              <line x1={plotLeft} y1={y} x2={plotRight} y2={y} stroke="var(--chart-grid)" strokeWidth="1" />
              <text x={plotLeft - 10} y={y + 4} textAnchor="end" fontSize="12" fill="var(--chart-muted)">{Math.round(v)}</text>
            </g>); })}
          {[0, 1, 2, 3, 4, 5].map(i => { const m = marginMin + (i * (marginMax - marginMin)) / 5; return (
            <text key={`x${i}`} x={xPos(m)} y={plotBottom + 22} textAnchor="middle" fontSize="12" fill="var(--chart-muted)">{Math.round(m)}%</text>); })}
          <text x={(plotLeft + plotRight) / 2} y={H - 8} textAnchor="middle" fontSize="13" fill="var(--chart-ink-secondary)" fontWeight="600">Gross margin →</text>
          <text x={18} y={midY} textAnchor="middle" fontSize="13" fill="var(--chart-ink-secondary)" fontWeight="600" transform={`rotate(-90 18 ${midY})`}>Units sold →</text>
          <line x1={xPos(medMargin)} y1={plotTop} x2={xPos(medMargin)} y2={plotBottom} stroke="var(--chart-grid)" strokeDasharray="4" />
          <line x1={plotLeft} y1={yPos(medVolume)} x2={plotRight} y2={yPos(medVolume)} stroke="var(--chart-grid)" strokeDasharray="4" />
          <text x={plotRight - 6} y={plotTop + 16} textAnchor="end" fontSize="12" fill="#2f9e44" fontWeight="700">★ best: high margin · high volume</text>
          {points.map((p, i) => (
            <g key={p.name} onMouseEnter={() => setHover(i)} style={{ cursor: 'pointer' }}>
              <circle cx={xPos(p.marginPct)} cy={yPos(p.volume)} r={radius(p.revenue)} fill={marketColor(i)} fillOpacity={hover === i ? 0.95 : 0.6} stroke="#fff" strokeWidth="1.5" />
              <text x={xPos(p.marginPct)} y={yPos(p.volume) - radius(p.revenue) - 4} textAnchor="middle" fontSize="11" fill="var(--chart-ink)" fontWeight="600">{p.name}</text>
            </g>
          ))}
          {hover != null && (() => {
            const p = points[hover]; const cx = xPos(p.marginPct), cy = yPos(p.volume);
            const tw = 196, th = 92; const tx = Math.min(cx + 14, plotRight - tw); const ty = Math.max(plotTop, cy - th - 8);
            return (
              <g>
                <rect x={tx} y={ty} width={tw} height={th} rx="6" fill="var(--chart-surface)" stroke="var(--chart-grid)" />
                <text x={tx + 10} y={ty + 20} fontSize="12" fontWeight="700" fill="var(--chart-ink)">{p.name}</text>
                <text x={tx + 10} y={ty + 40} fontSize="11" fill="var(--chart-ink-secondary)">Sold <tspan fontWeight="700" fill="var(--chart-ink)">{p.volume}</tspan> · Price <tspan fontWeight="700" fill="var(--chart-ink)">${p.sellPrice}</tspan></text>
                <text x={tx + 10} y={ty + 58} fontSize="11" fill="var(--chart-ink-secondary)">Cost <tspan fontWeight="700" fill="var(--chart-ink)">${p.cost}</tspan> · Margin <tspan fontWeight="700" fill="#2f9e44">{p.marginPct}%</tspan></text>
                <text x={tx + 10} y={ty + 76} fontSize="11" fill="var(--chart-ink-secondary)">Revenue <tspan fontWeight="700" fill="var(--chart-ink)">${p.revenue}</tspan></text>
              </g>
            );
          })()}
        </svg>
      );
    }

    function CoveragePanel({ title, hint, count, children }) {
      if (!count) return null;
      return (
        <div className="chart-container">
          <div className="chart-title">{title} ({count})</div>
          <div className="panel-hint" style={{ marginBottom: '8px' }}>{hint}</div>
          {children}
        </div>
      );
    }

    function MarginScatterDashboard() {
      const [data, setData] = useState(null);
      const [status, setStatus] = useState('loading');
      const [error, setError] = useState('');
      const [weeks, setWeeks] = useState(52);
      const [sortBy, setSortBy] = useState('totalMargin'); // 'totalMargin' | 'marginPct'
      useEffect(() => { fetchData(); }, [weeks]);
      const fetchData = async () => {
        try {
          setStatus('loading');
          const res = await fetch(`${window.location.origin}/api/product-margins?weeks=${weeks}`);
          const result = await res.json();
          if (result.error) { setError(result.message || result.error); setStatus('error'); return; }
          setData(result);
          setStatus(result.status === 'no-costs' ? 'no-costs' : 'ready');
        } catch (e) { setError('Failed to load data: ' + e.message); setStatus('error'); }
      };

      const top20 = (data && data.top20) || [];
      const costedTop20 = top20.filter(p => p.status === 'costed');
      const needsInfoTop20 = top20.filter(p => p.status === 'needs-info');

      const totalMargin = costedTop20.reduce((s, p) => s + p.totalMargin, 0);
      const totalRevenue = costedTop20.reduce((s, p) => s + p.revenue, 0);
      const weightedMarginPct = totalRevenue > 0 ? (totalMargin / totalRevenue) * 100 : 0;
      const sorted = [...costedTop20].sort((a, b) => sortBy === 'marginPct' ? b.marginPct - a.marginPct : b.totalMargin - a.totalMargin);
      const best = sorted[0];
      const worst = costedTop20.length ? [...costedTop20].sort((a, b) => a.marginPct - b.marginPct)[0] : null;
      const marginColor = (pct) => pct >= 60 ? '#2f9e44' : pct >= 35 ? '#b8860b' : '#d03b3b';
      const asDate = (iso) => iso ? new Date(iso).toLocaleDateString() : '—';

      return (
        <div className="container">
          <header>
            <h1>📊 Product Margins</h1>
            <p className="subtitle">Per product: what Square sold it for minus what it costs to make (Chef's Warehouse invoices via QuickBooks, priced through the Google Sheets recipe), weighted by units sold.</p>
          </header>
          <div className="controls">
            <div className="view-toggle">
              {MARGIN_WEEK_OPTIONS.map(o => (
                <button key={o.weeks} className={weeks === o.weeks ? 'active' : ''} onClick={() => setWeeks(o.weeks)}>{o.label}</button>
              ))}
            </div>
            {status === 'ready' && data && (
              <div className="panel-hint" style={{ margin: 0 }}>Costs as of {asDate(data.priceListDate)} · recipes built {asDate(data.generatedAt)}</div>
            )}
          </div>
          {status === 'loading' && <div className="loading">Loading margins… aggregating Square sales across locations (can take a minute the first time).</div>}
          {status === 'error' && <div className="error">{error}</div>}
          {status === 'no-costs' && <div className="empty">No recipe costs yet. Run <code>npm run margins</code> (needs QuickBooks + Google connected) to compute cost-to-make, then this view populates.</div>}
          {status === 'ready' && (
            <React.Fragment>
              <div className="metrics">
                <div className="metric-card"><div className="metric-label">Products Costed &amp; Sold</div><div className="metric-value">{costedTop20.length}</div><div className="metric-sub">of top 20 by revenue</div></div>
                <div className="metric-card"><div className="metric-label">Total Gross Margin</div><div className="metric-value">{fmtMoney(totalMargin)}</div><div className="metric-sub">over {weeks} weeks</div></div>
                <div className="metric-card"><div className="metric-label">Weighted Avg Margin</div><div className="metric-value">{weightedMarginPct.toFixed(1)}%</div><div className="metric-sub">revenue-weighted</div></div>
                {best && <div className="metric-card"><div className="metric-label">Top Margin Contributor</div><div className="metric-value" style={{ fontSize: '18px' }}>{best.name}</div><div className="metric-sub">{fmtMoney(best.totalMargin)} · {best.marginPct}%</div></div>}
              </div>

              {costedTop20.length > 0 ? (
                <div className="chart-container">
                  <div className="chart-title" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '10px' }}>
                    <span>Products by {sortBy === 'totalMargin' ? 'total margin contribution' : 'margin %'}</span>
                    <span className="view-toggle" style={{ fontSize: '12px' }}>
                      <button className={sortBy === 'totalMargin' ? 'active' : ''} onClick={() => setSortBy('totalMargin')}>Margin $</button>
                      <button className={sortBy === 'marginPct' ? 'active' : ''} onClick={() => setSortBy('marginPct')}>Margin %</button>
                    </span>
                  </div>
                  <div className="panel-hint">“Total margin” is per-unit margin × units sold over the window — the products that actually move the most money, not just the fattest per-unit margin.</div>
                  <table>
                    <thead><tr>
                      <th style={{ textAlign: 'left' }}>Product</th>
                      <th style={{ textAlign: 'right' }}>Sell price</th>
                      <th style={{ textAlign: 'right' }}>Cost/unit</th>
                      <th style={{ textAlign: 'right' }}>Margin/unit</th>
                      <th style={{ textAlign: 'right' }}>Margin %</th>
                      <th style={{ textAlign: 'right' }}>Units</th>
                      <th style={{ textAlign: 'right' }}>Total margin</th>
                    </tr></thead>
                    <tbody>
                      {sorted.map((p) => (
                        <tr key={p.name}>
                          <td style={{ textAlign: 'left' }} title={p.squareItem ? `Square: ${p.squareItem}` : ''}>{p.name}</td>
                          <td style={{ textAlign: 'right' }}>{fmtMoney(p.sellPrice)}</td>
                          <td style={{ textAlign: 'right' }}>{fmtMoney(p.cost)}</td>
                          <td style={{ textAlign: 'right' }}>{fmtMoney(p.marginDollars)}</td>
                          <td style={{ textAlign: 'right', fontWeight: 700, color: marginColor(p.marginPct) }}>{p.marginPct}%</td>
                          <td style={{ textAlign: 'right' }}>{p.volume}</td>
                          <td style={{ textAlign: 'right', fontWeight: 600 }}>{fmtMoney(p.totalMargin)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : (
                <div className="empty">Nothing costed &amp; sold yet — a product needs every ingredient priced, a per-unit yield, <em>and</em> Square sales. The coverage panels below show exactly what's missing.</div>
              )}

              {costedTop20.length > 0 && (
                <div className="chart-container">
                  <div className="chart-title">Volume × Gross Margin</div>
                  <div className="panel-hint">Bubble size = revenue. Best products sit top-right (high margin, high volume).</div>
                  <MarginScatterChart points={costedTop20} />
                </div>
              )}

              {needsInfoTop20.length > 0 && (
                <div className="chart-container">
                  <div className="chart-title" style={{ color: '#d03b3b' }}>Top 20 by Revenue — What's Missing</div>
                  <div className="panel-hint">These are in your top 20 revenue drivers but aren't costed yet. Here's what each one needs to be priced for gross margin calculations.</div>
                  <table>
                    <thead><tr>
                      <th style={{ textAlign: 'left' }}>Product</th>
                      <th style={{ textAlign: 'right' }}>Units Sold</th>
                      <th style={{ textAlign: 'right' }}>Revenue</th>
                      <th style={{ textAlign: 'left' }}>What's Needed</th>
                    </tr></thead>
                    <tbody>
                      {needsInfoTop20.map((p) => (
                        <tr key={p.name}>
                          <td style={{ textAlign: 'left' }}>{p.name}</td>
                          <td style={{ textAlign: 'right' }}>{fmtQty(p.volume)}</td>
                          <td style={{ textAlign: 'right', fontWeight: '600' }}>{fmtMoney(p.revenue)}</td>
                          <td style={{ textAlign: 'left', fontSize: '12px', color: 'var(--chart-ink-secondary)' }}>{p.detail}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </React.Fragment>
          )}
        </div>
      );
    }

    function MainApp() {
      const [activeTab, setActiveTab] = useState('dashboard');
      return (
        <div>
          <div style={{ background: '#f5f1ed', borderBottom: '2px solid #d4b5a0', paddingTop: '20px' }}>
            <div className="container">
              <div className="tabs">
                <button className={`tab-button ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>Financial Dashboard</button>
                <button className={`tab-button ${activeTab === 'overtime' ? 'active' : ''}`} onClick={() => setActiveTab('overtime')}>Overtime Report</button>
                <button className={`tab-button ${activeTab === 'prime-cost' ? 'active' : ''}`} onClick={() => setActiveTab('prime-cost')}>Prime Cost</button>
                <button className={`tab-button ${activeTab === 'pl-channel' ? 'active' : ''}`} onClick={() => setActiveTab('pl-channel')}>P&L by Channel</button>
                <button className={`tab-button ${activeTab === 'waste' ? 'active' : ''}`} onClick={() => setActiveTab('waste')}>Waste</button>
                <button className={`tab-button ${activeTab === 'market-performance' ? 'active' : ''}`} onClick={() => setActiveTab('market-performance')}>Performance by Market</button>
                <button className={`tab-button ${activeTab === 'product-margins' ? 'active' : ''}`} onClick={() => setActiveTab('product-margins')}>Product Margins</button>
              </div>
            </div>
          </div>
          <div className={`tab-content ${activeTab === 'dashboard' ? 'active' : ''}`}><DashboardContent /></div>
          <div className={`tab-content ${activeTab === 'overtime' ? 'active' : ''}`}><OvertimeContent /></div>
          <div className={`tab-content ${activeTab === 'prime-cost' ? 'active' : ''}`}><PrimeCostDashboard /></div>
          <div className={`tab-content ${activeTab === 'pl-channel' ? 'active' : ''}`}><PLByChannelDashboard /></div>
          <div className={`tab-content ${activeTab === 'waste' ? 'active' : ''}`}><WasteDashboard /></div>
          <div className={`tab-content ${activeTab === 'market-performance' ? 'active' : ''}`}><MarketPerformanceDashboard /></div>
          <div className={`tab-content ${activeTab === 'product-margins' ? 'active' : ''}`}><MarginScatterDashboard /></div>
        </div>
      );
    }
    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      if (!isAuthenticated) return <LoginScreen onLogin={() => setIsAuthenticated(true)} />;
      return <MainApp />;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
