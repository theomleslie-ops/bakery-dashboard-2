<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakery Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.0/dist/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --series-cogs: #ff9500; --series-opex: #8b5cf6; --series-pl-good: #10b981; --series-pl-bad: #ef4444;
      --chart-surface: #ffffff; --chart-ink: #0b0b0b; --chart-ink-secondary: #52514e; --chart-muted: #898781;
      --chart-grid: #e1e0d9; --chart-axis: #000000;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f1ed; color: #2c2416; }
    .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
    header { margin-bottom: 40px; } h1 { font-size: 32px; color: #6b4423; margin-bottom: 10px; }
    .subtitle { color: #8b6c57; font-size: 14px; }
    .controls { display: flex; gap: 20px; margin: 30px 0; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .view-toggle { display: flex; gap: 8px; }
    button { padding: 10px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; background: white; color: #6b4423; border: 1px solid #d4b5a0; }
    button:hover { background: #e8ddd5; border-color: #6b4423; }
    button.active { background: #6b4423; color: white; border-color: #6b4423; }
    input[type="file"] { padding: 8px; border: 1px solid #d4b5a0; border-radius: 6px; background: white; }
    .upload-btn { padding: 10px 20px; background: #6b4423; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .upload-btn:hover { background: #5a3a1e; }
    .chart-container { background: white; padding: 24px; border-radius: 8px; margin: 30px 0; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); }
    .chart-title { font-size: 16px; font-weight: 600; color: #6b4423; margin-bottom: 20px; }
    .chart-legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
    .chart-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--chart-ink-secondary); }
    .chart-legend-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
    .error { background: #fee; color: #c33; padding: 16px; border-radius: 6px; margin: 20px 0; }
    .loading { background: white; color: #8b6c57; padding: 24px; border-radius: 8px; margin: 20px 0; }
    .tabs { display: flex; gap: 12px; margin-bottom: 30px; border-bottom: 2px solid #d4b5a0; }
    .tab-button { padding: 12px 20px; background: transparent; border: none; border-bottom: 3px solid #6b4423; color: #6b4423; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: -2px; }
    .tab-button:hover { background: #f5f1ed; border-bottom-color: #6b4423; }
    .tab-button.active { border-bottom-color: #d4b5a0; color: #8b6c57; background: transparent; font-weight: 600; }
    .tab-content { display: none; } .tab-content.active { display: block; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 30px 0; }
    .metric-card { background: white; padding: 24px; border-radius: 8px; border-left: 4px solid #6b4423; }
    .metric-label { font-size: 12px; color: #8b6c57; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .metric-value { font-size: 28px; font-weight: 600; color: #6b4423; }
    .metric-sub { font-size: 12px; color: #8b6c57; margin-top: 4px; }
    .panel { background: white; padding: 24px; border-radius: 8px; margin: 30px 0; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); }
    .panel-title { font-size: 16px; font-weight: 600; color: #6b4423; margin-bottom: 6px; }
    .panel-hint { font-size: 12px; color: #8b6c57; margin-bottom: 20px; }
    .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #5a4a3a; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .swatch-base { background: #3f8361; } .swatch-bakery { background: #2b6cb0; } .swatch-nonbakery { background: #c05621; }
    .stacked-chart { display: flex; gap: 12px; }
    .chart-y-axis { position: relative; width: 56px; flex-shrink: 0; }
    .y-tick { position: absolute; right: 8px; transform: translateY(50%); font-size: 11px; color: #8b6c57; white-space: nowrap; }
    .chart-plot { position: relative; flex: 1; border-left: 1px solid #d4b5a0; border-bottom: 1px solid #d4b5a0; overflow-x: auto; overflow-y: visible; min-width: 0; }
    .gridline { position: absolute; left: 0; right: 0; border-top: 1px dashed #ece2d8; }
    .chart-bars { position: relative; display: flex; align-items: flex-end; gap: 28px; height: 100%; padding: 0 20px; min-width: max-content; }
    .bar-col-wrap { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
    .bar-col { width: 56px; display: flex; flex-direction: column; border-radius: 4px 4px 0 0; overflow: hidden; cursor: pointer; position: relative; }
    .bar-col.period-selected { outline: 2px solid #6b4423; outline-offset: 2px; }
    .seg { width: 100%; transition: filter 0.15s; }
    .bar-col:hover .seg { filter: brightness(1.1); }
    .seg-nonbakery { background: #c05621; } .seg-bakery { background: #2b6cb0; } .seg-base { background: #3f8361; }
    .seg-waste { background: var(--series-pl-bad); }
    .bar-x-label { margin-top: 8px; font-size: 12px; color: #6b4423; font-weight: 500; text-align: center; }
    .stack-tooltip { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); background: #2c2416; color: white; font-size: 12px; line-height: 1.6; padding: 10px 12px; border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 10; }
    .bar-row { display: grid; grid-template-columns: 180px 1fr 130px; align-items: center; gap: 12px; padding: 6px 0; }
    .bar-row-label { font-size: 13px; color: #2c2416; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { background: #f0e8e0; border-radius: 4px; height: 22px; position: relative; }
    .bar-fill { background: #6b4423; height: 100%; border-radius: 4px; min-width: 4px; transition: filter 0.15s; cursor: pointer; }
    .bar-fill:hover { filter: brightness(1.15); }
    .bar-row-value { font-size: 13px; font-weight: 600; color: #6b4423; }
    .bar-tooltip { position: absolute; background: #2c2416; color: white; font-size: 12px; padding: 8px 10px; border-radius: 6px; white-space: nowrap; pointer-events: none; transform: translateY(-115%); z-index: 10; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; color: #8b6c57; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; border-bottom: 2px solid #e8ddd5; }
    th.num, td.num { text-align: right; }
    td { padding: 12px; border-bottom: 1px solid #f0e8e0; }
    tr.fn-row { cursor: pointer; }
    tr.fn-row:hover { background: #faf6f2; }
    .category-tag { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
    .category-tag.bakery { background: #e3edf7; color: #2b6cb0; }
    .category-tag.non-bakery { background: #fbe8d9; color: #c05621; }
    .expand-icon { display: inline-block; width: 14px; color: #8b6c57; }
    .employee-detail { background: #faf6f2; }
    .employee-detail td { padding: 8px 12px 8px 40px; font-size: 12px; color: #5a4a3a; border-bottom: 1px solid #f0e8e0; }
    .empty { background: white; color: #8b6c57; padding: 24px; border-radius: 8px; margin: 20px 0; font-size: 14px; }
    .margin-bar-list { display: flex; flex-direction: column; gap: 8px; max-height: 640px; overflow-y: auto; padding-right: 4px; }
    .margin-bar-row { display: grid; grid-template-columns: 200px 1fr 150px; align-items: center; gap: 14px; }
    .margin-bar-label { font-size: 12px; color: var(--chart-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .margin-bar-track { position: relative; height: 14px; background: #f5f1ed; border: 1px solid #e8ddd5; border-radius: 4px; overflow: hidden; }
    .margin-bar-fill { position: absolute; top: 0; left: 0; height: 100%; min-width: 3px; background: var(--series-cogs); border-radius: 4px; }
    .margin-bar-refline { position: absolute; top: -1px; bottom: -1px; border-left: 1px dashed #a89a89; }
    .margin-bar-value { font-size: 12px; font-weight: 600; color: var(--chart-ink); text-align: right; white-space: nowrap; }
    .margin-bar-detail { display: block; font-size: 10px; font-weight: 400; color: var(--chart-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const DASHBOARD_PASSWORD = 'bakery123';
    function LoginScreen({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const handleSubmit = (e) => {
        e.preventDefault();
        if (password === DASHBOARD_PASSWORD) { onLogin(); }
        else { setError('Incorrect password'); setPassword(''); }
      };
      return (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: '#f5f1ed' }}>
          <div style={{ background: 'white', padding: '40px', borderRadius: '12px', boxShadow: '0 4px 12px rgba(0,0,0,0.1)', width: '100%', maxWidth: '320px' }}>
            <h1 style={{ textAlign: 'center', color: '#6b4423', marginBottom: '30px', fontSize: '24px' }}>🍞 Bakery Dashboard</h1>
            <form onSubmit={handleSubmit}>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Enter password" autoFocus style={{ width: '100%', padding: '12px', border: '1px solid #d4b5a0', borderRadius: '6px', fontSize: '14px', marginBottom: '12px', boxSizing: 'border-box' }} />
              {error && <div style={{ color: '#c33', fontSize: '12px', marginBottom: '12px' }}>{error}</div>}
              <button type="submit" style={{ width: '100%', padding: '12px', background: '#6b4423', color: 'white', border: 'none', borderRadius: '6px', fontSize: '14px', fontWeight: '600', cursor: 'pointer' }}>Login</button>
            </form>
          </div>
        </div>
      );
    }

    const COST_SERIES = [
      { key: 'cogs', label: 'COGS', color: 'var(--series-cogs)' },
      { key: 'opex', label: 'Operating Expenses', color: 'var(--series-opex)' },
    ];
    const formatDollars = (val) => `$${(val / 1000).toFixed(0)}k`;
    const formatDollarsPrecise = (val) => `$${Math.round(val).toLocaleString()}`;
    const formatPercent = (val) => `${Math.abs(val).toFixed(0)}%`;
    const formatPercentPrecise = (val) => `${Math.abs(val).toFixed(1)}%`;

    const StackedBarChart = ({ data, viewMode }) => {
      const [hoveredMonth, setHoveredMonth] = React.useState(null);
      const rawValue = (d, key) => parseFloat(d[key]) || 0;
      const scaled = (d, key) => {
        const raw = rawValue(d, key);
        if (viewMode === 'percent') {
          const revenue = rawValue(d, 'revenue');
          return revenue ? (raw / revenue) * 100 : 0;
        }
        return raw;
      };
      const points = data.map(d => {
        const revenue = scaled(d, 'revenue');
        const cogs = scaled(d, 'cogs');
        const opex = scaled(d, 'opex');
        const pl = scaled(d, 'pl');
        return { month: d.month, revenue, cogs, opex, pl };
      });

      // Independent line chart: each line scales independently
      const allValues = points.flatMap(p => [p.revenue, p.cogs, p.opex, p.pl]);
      const maxVal = Math.max(...allValues.filter(v => v >= 0), 1);
      const minVal = Math.min(...allValues.filter(v => v < 0), 0);
      const chartHeight = 400;
      const range = maxVal - minVal || 1;
      const n = data.length || 1;
      const slotWidth = 700 / n;
      const labelStride = Math.max(1, Math.ceil(n / 16));
      const xPos = (i) => 50 + slotWidth * i + slotWidth / 2;
      const getY = (val) => {
        const safeVal = isNaN(val) ? 0 : val;
        // Linear scale: maxVal at top (Y=50), minVal at bottom (Y=450)
        return 50 + ((maxVal - safeVal) / range) * chartHeight;
      };
      const zeroY = 50 + ((maxVal - 0) / range) * chartHeight;
      const formatAxis = viewMode === 'percent' ? formatPercent : formatDollars;

      const makePath = (key) => {
        return points.map((p, i) => `${xPos(i)},${getY(p[key])}`).join(' ');
      };

      const legendItems = [
        { label: 'Revenue', color: '#2a78d6' },
        { label: 'COGS', color: '#ff9500' },
        { label: 'Operating Expenses', color: '#8b5cf6' },
        { label: 'Profit/Loss', color: '#10b981' },
      ];

      return (
        <div style={{ width: '100%' }}>
          <div className="chart-legend">
            {legendItems.map(item => (
              <div key={item.label} className="chart-legend-item">
                <div className="chart-legend-swatch" style={{ backgroundColor: item.color }}></div>
                <span>{item.label}</span>
              </div>
            ))}
          </div>
          <svg width="100%" height="550" viewBox="0 0 800 550">
            <line x1="50" y1={zeroY} x2="750" y2={zeroY} stroke="var(--chart-axis)" strokeWidth="2" />
            <line x1="50" y1="50" x2="50" y2={50 + chartHeight} stroke="var(--chart-axis)" strokeWidth="2" />
            {[0, 1, 2, 3, 4, 5].map(i => {
              const y = 50 + (chartHeight / 5) * i;
              const val = maxVal - (range * i / 5);
              return (
                <g key={`grid${i}`}>
                  <line x1="50" y1={y} x2="750" y2={y} stroke="var(--chart-grid)" strokeWidth="1" />
                  <text x="40" y={y + 4} textAnchor="end" fontSize="11" fill="var(--chart-muted)">{formatAxis(val)}</text>
                </g>
              );
            })}
            <polyline points={makePath('revenue')} fill="none" stroke="#2a78d6" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
            <polyline points={makePath('cogs')} fill="none" stroke="#ff9500" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
            <polyline points={makePath('opex')} fill="none" stroke="#8b5cf6" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
            <polyline points={makePath('pl')} fill="none" stroke="#10b981" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
            {points.map((p, i) => (<circle key={`rev${i}`} cx={xPos(i)} cy={getY(p.revenue)} r="3" fill="#2a78d6" onMouseEnter={() => setHoveredMonth(i)} onMouseLeave={() => setHoveredMonth(null)} style={{ cursor: 'pointer' }} />))}
            {points.map((p, i) => (<circle key={`cogs${i}`} cx={xPos(i)} cy={getY(p.cogs)} r="3" fill="#ff9500" onMouseEnter={() => setHoveredMonth(i)} onMouseLeave={() => setHoveredMonth(null)} style={{ cursor: 'pointer' }} />))}
            {points.map((p, i) => (<circle key={`opex${i}`} cx={xPos(i)} cy={getY(p.opex)} r="3" fill="#8b5cf6" onMouseEnter={() => setHoveredMonth(i)} onMouseLeave={() => setHoveredMonth(null)} style={{ cursor: 'pointer' }} />))}
            {points.map((p, i) => (<circle key={`pl${i}`} cx={xPos(i)} cy={getY(p.pl)} r="3" fill="#10b981" onMouseEnter={() => setHoveredMonth(i)} onMouseLeave={() => setHoveredMonth(null)} style={{ cursor: 'pointer' }} />))}
            {points.map((p, i) => (i % labelStride === 0) && (<text key={`label${i}`} x={xPos(i)} y={50 + chartHeight + 20} textAnchor="middle" fontSize="12" fill="var(--chart-ink)" fontWeight="600">{p.month}</text>))}
            {hoveredMonth !== null && (
              (() => {
                const p = points[hoveredMonth];
                const cx = xPos(hoveredMonth);
                const tooltipWidth = 220;
                const tooltipHeight = 110;
                const tooltipX = cx < 400 ? cx + 12 : cx - tooltipWidth - 12;
                const tooltipY = 30;
                const format = viewMode === 'percent' ? formatPercentPrecise : formatDollarsPrecise;
                return (
                  <g key={`tooltip${hoveredMonth}`}>
                    <line x1={cx} y1="50" x2={cx} y2={50 + chartHeight} stroke="var(--chart-grid)" strokeWidth="1" strokeDasharray="3" />
                    <rect x={tooltipX} y={tooltipY} width={tooltipWidth} height={tooltipHeight} fill="var(--chart-surface)" stroke="var(--chart-grid)" strokeWidth="1" rx="6" />
                    <text x={tooltipX + 10} y={tooltipY + 18} fontSize="12" fontWeight="700" fill="var(--chart-ink)">{p.month}</text>
                    <text x={tooltipX + 10} y={tooltipY + 36} fontSize="11" fill="var(--chart-ink-secondary)">Revenue: {format(p.revenue)}</text>
                    <text x={tooltipX + 10} y={tooltipY + 54} fontSize="11" fill="var(--chart-ink-secondary)">COGS: {format(p.cogs)}</text>
                    <text x={tooltipX + 10} y={tooltipY + 72} fontSize="11" fill="var(--chart-ink-secondary)">OpEx: {format(p.opex)}</text>
                    <text x={tooltipX + 10} y={tooltipY + 90} fontSize="11" fill="var(--chart-ink-secondary)" fontWeight="600">{p.pl >= 0 ? 'Profit' : 'Loss'}: {format(Math.abs(p.pl))}</text>
                  </g>
                );
              })()
            )}
          </svg>
        </div>
      );
    };

    const WEEK_COUNT_OPTIONS = [
      { weeks: 8, label: '8 Weeks' },
      { weeks: 16, label: '16 Weeks' },
      { weeks: 26, label: '26 Weeks' },
      { weeks: 52, label: '52 Weeks' },
    ];

    function DashboardContent() {
      const [data, setData] = useState([]);
      const [error, setError] = useState('');
      const [weeklySource, setWeeklySource] = useState('');
      const [viewMode, setViewMode] = useState('dollars');
      const [weeksRange, setWeeksRange] = useState(16);
      useEffect(() => { fetchData(); }, [weeksRange]);
      const fetchData = async () => {
        try {
          const baseUrl = window.location.origin;
          const response = await fetch(`${baseUrl}/api/dashboard?weeks=${weeksRange}`);
          const result = await response.json();
          setData((result.weeklyData || []).map(w => ({ ...w, month: w.label })));
          setWeeklySource(result.weeklySource || '');
        } catch (err) {
          setError('Failed to load data: ' + err.message);
        }
      };
      return (
        <div className="container">
          <header>
            <h1>📊 P/L Dashboard</h1>
            <p className="subtitle">Weekly Profit, Cost of Goods, and Operating Expenses</p>
          </header>
          {error && <div className="error">{error}</div>}
          <div className="controls">
            <div className="view-toggle">
              {WEEK_COUNT_OPTIONS.map(opt => (
                <button key={opt.weeks} className={weeksRange === opt.weeks ? 'active' : ''} onClick={() => setWeeksRange(opt.weeks)}>{opt.label}</button>
              ))}
            </div>
            {data.length > 0 && (
              <div className="view-toggle">
                <button className={viewMode === 'dollars' ? 'active' : ''} onClick={() => setViewMode('dollars')}>Dollars</button>
                <button className={viewMode === 'percent' ? 'active' : ''} onClick={() => setViewMode('percent')}>% of Revenue</button>
              </div>
            )}
          </div>
          {!error && data.length === 0 && (
            <div className="empty">
              No weekly P&amp;L data available ({weeklySource || 'loading…'}). <a href="/api/quickbooks/connect">Connect QuickBooks</a> to populate this view - weekly figures come straight from your books, never averaged down from monthly totals.
            </div>
          )}
          {data.length > 0 && (
            <div className="chart-container">
              <div className="chart-title">COGS, Operating Expenses & Profit/Loss by Week ({viewMode === 'percent' ? '% of Revenue' : '$'})</div>
              <StackedBarChart data={data} viewMode={viewMode} />
            </div>
          )}
        </div>
      );
    }

    const round2 = (n) => Math.round(n * 100) / 100;
    const fmtHours = (h) => `${h.toFixed(1)}h`;
    const fmtMoney = (v) => `$${v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    const fmtMoneyShort = (v) => { if (v >= 1000) return `$${Math.round(v / 1000).toLocaleString()}k`; return `$${Math.round(v)}`; };
    const fmtQty = (v) => v.toLocaleString(undefined, { maximumFractionDigits: 1 });
    const pct = (part, whole) => (whole > 0 ? `${((part / whole) * 100).toFixed(1)}%` : '0%');
    const fmtMonthLabel = (monthKey) => { const [y, m] = monthKey.split('-').map(Number); return new Date(y, m - 1, 1).toLocaleDateString(undefined, { month: 'short', year: 'numeric' }); };
    const fmtWeekLabel = (dateStr) => { const [y, m, d] = dateStr.split('-').map(Number); return new Date(y, m - 1, d).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); };
    const niceMax = (v) => { if (v <= 0) return 100; const magnitude = Math.pow(10, Math.floor(Math.log10(v))); const residual = v / magnitude; let niceResidual; if (residual <= 1) niceResidual = 1; else if (residual <= 2) niceResidual = 2; else if (residual <= 5) niceResidual = 5; else niceResidual = 10; return niceResidual * magnitude; };
    const BAKERY_FUNCTIONS = new Set(['Baker AM', 'Baker Night', 'Baker PM', 'LSK Cold Line', 'LSK Hot Line', 'LSK Prep Only', 'LSK-Arc BOH', 'Dishwasher/ Porter']);
    const classifyFunction = (name) => { if (BAKERY_FUNCTIONS.has(name)) return 'bakery'; if (/\bbaker\b|\bboh\b|\bprep\b|dishwash|porter|\bline\b|\bkitchen\b/i.test(name)) return 'bakery'; return 'non-bakery'; };
    function buildWeeklyData(weeks) {
      return weeks.map((w) => {
        const functions = (w.functions || []).map((f) => ({
          function: f.function, category: classifyFunction(f.function), regularHours: round2(f.regularHours || 0),
          otHours: round2(f.ot15Hours + f.ot2Hours || 0), ot15Hours: round2(f.ot15Hours || 0), ot2Hours: round2(f.ot2Hours || 0),
          regularWage: round2(f.regularWage || 0), otWage: round2(f.otWage || 0),
          employees: (f.employees || []).sort((a, b) => b.otWage - a.otWage).map((e) => ({ name: e.name, otHours: round2(e.otHours), otWage: round2(e.otWage) }))
        })).sort((a, b) => b.otWage - a.otWage);
        const totalWage = functions.reduce((s, f) => s + f.regularWage + f.otWage, 0);
        const bakeryOtWage = functions.filter((f) => f.category === 'bakery').reduce((s, f) => s + f.otWage, 0);

    function buildMonthlyData(weeks) {
      const monthMap = new Map();

        const monthKey = w.weekStart.slice(0, 7);
        if (!monthMap.has(monthKey)) monthMap.set(monthKey, { monthKey, functionTotals: new Map() });
        const m = monthMap.get(monthKey);

          const category = classifyFunction(f.function);
          const prev = m.functionTotals.get(f.function) || { function: f.function, category, regularHours: 0, otHours: 0, ot15Hours: 0, ot2Hours: 0, regularWage: 0, otWage: 0, employeeMap: new Map() };

          prev.ot2Hours += f.ot2Hours;

          prev.otWage += f.otWage;

            pe.otWage += e.otWage;
            prev.employeeMap.set(e.name, pe);

          m.functionTotals.set(f.function, prev);
        });
      });

        const functions = [...m.functionTotals.values()].map((f) => ({ function: f.function, category: f.category, regularHours: round2(f.regularHours), otHours: round2(f.otHours), ot15Hours: round2(f.ot15Hours), ot2Hours: round2(f.ot2Hours), regularWage: round2(f.regularWage), otWage: round2(f.otWage), employees: [...f.employeeMap.values()].sort((a, b) => b.otWage - a.otWage).map((e) => ({ name: e.name, otHours: round2(e.otHours), otWage: round2(e.otWage) })) })).sort((a, b) => b.otWage - a.otWage);
        const totalWage = functions.reduce((s, f) => s + f.regularWage + f.otWage, 0);
        const bakeryOtWage = functions.filter((f) => f.category === 'bakery').reduce((s, f) => s + f.otWage, 0);
        const nonBakeryOtWage = functions.filter((f) => f.category === 'non-bakery').reduce((s, f) => s + f.otWage, 0);
        return { monthKey: m.monthKey, totalWage: round2(totalWage), bakeryOtWage: round2(bakeryOtWage), nonBakeryOtWage: round2(nonBakeryOtWage), baseWage: round2(Math.max(totalWage - bakeryOtWage - nonBakeryOtWage, 0)), totalOtWage: round2(bakeryOtWage + nonBakeryOtWage), functions };

    const CHART_HEIGHT = 320;
    function MonthlyStackedBarChart({ months, selectedMonth, onSelectMonth, labelFormatter = fmtMonthLabel, fillWidth = false }) {
      // `hovered` also carries the hovered bar's viewport rect, so the tooltip can be portaled to

          </div>

                const bakeryPx = m.totalWage > 0 ? (m.bakeryOtWage / m.totalWage) * barPx : 0;

    const PLChannelChart = ({ data }) => {
      const [hoveredIndex, setHoveredIndex] = useState(null);

      const chartHeight = 400;
      const maxValue = Math.max(...data.flatMap(d => [d.revenue, d.variableCosts, d.bakeryAllocation, d.pl]), 0);
      const chartMax = niceMax(maxValue * 1.1);
      const getBarHeight = (value) => (value / chartMax) * chartHeight;
      const colors = {
        revenue: '#2b6cb0',
        variableCosts: '#c05621',
        bakeryAllocation: '#3f8361',
        pl: '#0ca30c',
        plLoss: '#d03b3b',

      return (
        <div style={{ width: '100%' }}>
          <div className="chart-legend">

              <span>Revenue</span>
            </div>
            <div className="chart-legend-item">
              <div className="chart-legend-swatch" style={{ backgroundColor: colors.variableCosts }}></div>
              <span>Variable Costs</span>
            </div>
            <div className="chart-legend-item">
              <div className="chart-legend-swatch" style={{ backgroundColor: colors.bakeryAllocation }}></div>
              <span>Bakery Allocation</span>
            </div>
            <div className="chart-legend-item">
              <div className="chart-legend-swatch" style={{ backgroundColor: colors.pl }}></div>
              <span>Profit</span>
            </div>

          <svg width="100%" height="550" viewBox={`0 0 ${Math.max(1000, data.length * 120)} 550`} style={{ overflow: 'visible' }}>
            <line x1="60" y1={chartHeight + 50} x2={Math.max(900, data.length * 100)} y2={chartHeight + 50} stroke="var(--chart-axis)" strokeWidth="2" />
            <line x1="60" y1="20" x2="60" y2={chartHeight + 50} stroke="var(--chart-axis)" strokeWidth="2" />
            {[0, 1, 2, 3, 4, 5].map(i => {
              const val = (i * chartMax / 5);
              const y = chartHeight + 50 - (i * chartHeight / 5);
              return (
                <g key={`grid${i}`}>
                  <line x1="60" y1={y} x2={Math.max(900, data.length * 100)} y2={y} stroke="var(--chart-grid)" strokeWidth="1" />
                  <text x="50" y={y + 4} textAnchor="end" fontSize="11" fill="var(--chart-muted)">{fmtMoneyShort(val)}</text>
                </g>
              );
            })}
            {data.map((item, i) => {
              const n = data.length || 1;
              const slotWidth = Math.max(100, 900 / n);
              const barWidth = Math.min(50, slotWidth * 0.5);
              const cx = 60 + slotWidth * i + slotWidth / 2;
              const baselineY = chartHeight + 50;
              const revenueHeight = getBarHeight(item.revenue);
              const costsHeight = getBarHeight(item.variableCosts);
              const allocHeight = getBarHeight(item.bakeryAllocation);
              const plHeight = getBarHeight(Math.abs(item.pl));
              const revenueY = baselineY - revenueHeight;
              const costsY = revenueY - costsHeight;
              const allocY = costsY - allocHeight;
              const plY = item.pl >= 0 ? allocY - plHeight : baselineY + plHeight;
              return (
                <g key={`bar${i}`}>
                  <rect x={cx - barWidth / 2} y={revenueY} width={barWidth} height={revenueHeight} fill={colors.revenue} rx="2" onMouseEnter={() => setHoveredIndex(i)} onMouseLeave={() => setHoveredIndex(null)} />
                  <rect x={cx - barWidth / 2} y={costsY} width={barWidth} height={costsHeight} fill={colors.variableCosts} rx="2" onMouseEnter={() => setHoveredIndex(i)} onMouseLeave={() => setHoveredIndex(null)} />
                  <rect x={cx - barWidth / 2} y={allocY} width={barWidth} height={allocHeight} fill={colors.bakeryAllocation} rx="2" onMouseEnter={() => setHoveredIndex(i)} onMouseLeave={() => setHoveredIndex(null)} />
                  <rect x={cx - barWidth / 2} y={item.pl >= 0 ? plY : baselineY - plHeight} width={barWidth} height={plHeight} fill={item.pl >= 0 ? colors.pl : colors.plLoss} rx="2" onMouseEnter={() => setHoveredIndex(i)} onMouseLeave={() => setHoveredIndex(null)} />
                  <rect x={cx - slotWidth / 2} y="20" width={slotWidth} height={chartHeight + 30} fill="transparent" style={{ cursor: 'pointer' }} onMouseEnter={() => setHoveredIndex(i)} onMouseLeave={() => setHoveredIndex(null)} />
                  <text x={cx} y={baselineY + 20} textAnchor="middle" fontSize="12" fill="var(--chart-ink)" fontWeight="600">{item.label}</text>
                </g>
              );
            })}
            {hoveredIndex !== null && (
              (() => {
                const item = data[hoveredIndex];
                const n = data.length || 1;
                const slotWidth = Math.max(100, 900 / n);
                const cx = 60 + slotWidth * hoveredIndex + slotWidth / 2;
                const tooltipWidth = 220;
                const tooltipHeight = 150;
                const tooltipX = cx < 500 ? cx + 12 : cx - tooltipWidth - 12;
                const tooltipY = 30;
                return (
                  <g key={`tooltip${hoveredIndex}`}>
                    <line x1={cx} y1="20" x2={cx} y2={chartHeight + 50} stroke="var(--chart-grid)" strokeWidth="1" strokeDasharray="3" />
                    <rect x={tooltipX} y={tooltipY} width={tooltipWidth} height={tooltipHeight} fill="var(--chart-surface)" stroke="var(--chart-grid)" strokeWidth="1" rx="6" />
                    <text x={tooltipX + 10} y={tooltipY + 18} fontSize="12" fontWeight="700" fill="var(--chart-ink)">{item.label}</text>
                    <text x={tooltipX + 10} y={tooltipY + 36} fontSize="11" fill="var(--chart-ink-secondary)">Revenue: {fmtMoney(item.revenue)}</text>
                    <text x={tooltipX + 10} y={tooltipY + 54} fontSize="11" fill="var(--chart-ink-secondary)">Variable Costs: {fmtMoney(item.variableCosts)}</text>
                    <text x={tooltipX + 10} y={tooltipY + 72} fontSize="11" fill="var(--chart-ink-secondary)">Bakery Alloc: {fmtMoney(item.bakeryAllocation)}</text>
                    <text x={tooltipX + 10} y={tooltipY + 105} fontSize="11" fontWeight="600" fill={item.pl >= 0 ? '#0ca30c' : '#d03b3b'}>{item.pl >= 0 ? 'Profit' : 'Loss'}: {fmtMoney(Math.abs(item.pl))}</text>
                  </g>
                );
              })()
            )}
          </svg>
        </div>
      );
    };

    // Aggregate item+day waste rows into day/week(Monday-start)/month buckets for the bar chart.
    const wastePeriodKey = (date, granularity) => {
      if (granularity === 'day') return date;
      if (granularity === 'month') return date.slice(0, 7);
      const d = new Date(`${date}T00:00:00Z`);
      const isoDow = (d.getUTCDay() + 6) % 7; // 0 = Monday
      d.setUTCDate(d.getUTCDate() - isoDow);
      return d.toISOString().slice(0, 10);
    };

    function buildWastePeriods(rows, granularity) {
      const map = new Map();
      rows.forEach((r) => {
        const key = wastePeriodKey(r.date, granularity);
        const entry = map.get(key) || { period: key, quantityProduced: 0, quantitySold: 0, waste: 0, producedValue: 0, soldValue: 0, wasteValue: 0 };
        entry.quantityProduced += r.quantityProduced;
        entry.quantitySold += r.quantitySold;
        entry.waste += r.waste;
        entry.producedValue += r.producedValue || 0;
        entry.soldValue += r.soldValue || 0;
        entry.wasteValue += r.wasteValue || 0;
        map.set(key, entry);
      });
      return [...map.values()].sort((a, b) => a.period.localeCompare(b.period));
    }

    function buildWasteByItem(rows) {
      const map = new Map();
      rows.forEach((r) => {
        const entry = map.get(r.item) || { item: r.item, quantityProduced: 0, quantitySold: 0, waste: 0, ordered: null };
        entry.quantityProduced += r.quantityProduced;
        entry.quantitySold += r.quantitySold;
        entry.waste += r.waste;
        if (r.ordered != null) entry.ordered = (entry.ordered || 0) + r.ordered;
        map.set(r.item, entry);
      });
      return [...map.values()].sort((a, b) => b.waste - a.waste);
    }

    const fmtPeriodLabel = (period, granularity) => {
      if (granularity === 'month') { const [y, m] = period.split('-').map(Number); return new Date(y, m - 1, 1).toLocaleDateString(undefined, { month: 'short', year: 'numeric' }); }
      return new Date(`${period}T00:00:00Z`).toLocaleDateString(undefined, { month: 'short', day: 'numeric', timeZone: 'UTC' });
    };

    function WasteBarChart({ periods, granularity, selectedPeriod, onSelectPeriod }) {
      // `hovered` carries the hovered bar's viewport rect so the tooltip can be portaled to
      // document.body and positioned with `position: fixed` - it used to be an absolutely-positioned
      // child of .chart-plot, which sets `overflow-x: auto`. Per the CSS spec, a non-visible
      // overflow-x forces the paired overflow-y to compute as auto too (not visible, no matter what's
      // written), so the tooltip could get silently clipped/hidden by that container's own edges.
      const [hovered, setHovered] = useState(null);
      const maxWasteValue = niceMax(Math.max(...periods.map((p) => p.wasteValue), 0) * 1.15);
      const tickCount = 5;
      const ticks = Array.from({ length: tickCount }, (_, i) => (maxWasteValue / (tickCount - 1)) * i);
      return (
        <div className="stacked-chart">
          <div className="chart-y-axis" style={{ height: CHART_HEIGHT }}>
            {ticks.map((t) => (<div key={t} className="y-tick" style={{ bottom: `${(t / maxWasteValue) * CHART_HEIGHT}px` }}>{fmtMoneyShort(t)}</div>))}
          </div>
          <div className="chart-plot" style={{ height: CHART_HEIGHT }}>
            {ticks.map((t) => (<div key={t} className="gridline" style={{ bottom: `${(t / maxWasteValue) * CHART_HEIGHT}px` }} />))}
            <div className="chart-bars">
              {periods.map((p) => {
                const barPx = maxWasteValue > 0 ? (p.wasteValue / maxWasteValue) * CHART_HEIGHT : 0;
                const isSelected = p.period === selectedPeriod;
                return (
                  <div className="bar-col-wrap" key={p.period}>
                    <div
                      className={`bar-col${isSelected ? ' period-selected' : ''}`}
                      style={{ height: `${Math.max(barPx, 2)}px` }}
                      onMouseEnter={(e) => setHovered({ period: p, rect: e.currentTarget.getBoundingClientRect() })}
                      onMouseLeave={() => setHovered(null)}
                      onClick={() => onSelectPeriod(p.period)}
                    >
                      <div className="seg seg-waste" style={{ height: '100%' }} />
                    </div>
                    <div className="bar-x-label">{fmtPeriodLabel(p.period, granularity)}</div>
                  </div>
                );
              })}
            </div>
          </div>
          {hovered && ReactDOM.createPortal(
            <div
              className="stack-tooltip"
              style={{ position: 'fixed', top: `${hovered.rect.top - 10}px`, left: `${hovered.rect.left + hovered.rect.width / 2}px`, bottom: 'auto', transform: 'translate(-50%, -100%)' }}
            >
              <strong>{fmtPeriodLabel(hovered.period.period, granularity)}</strong><br />
              Produced: {fmtMoney(hovered.period.producedValue)}<br />
              Sold: {fmtMoney(hovered.period.soldValue)}<br />
              Waste: {fmtMoney(hovered.period.wasteValue)} ({pct(hovered.period.waste, hovered.period.quantityProduced)})
            </div>,
            document.body
          )}
        </div>
      );
    }

    function WasteDashboard() {
      const [locationOptions, setLocationOptions] = useState({ stores: [], markets: [] });

      }, []);

      const fetchData = async (loc) => {

          setStatus('loading');
          setError('');

          const result = await response.json();
          if (result.error) { setError(result.error); setStatus('error'); return; }
          setWasteData(result);
          setStatus(result.status || (result.rows && result.rows.length ? 'ready' : 'empty'));
        } catch (err) {
          setError('Failed to load data: ' + err.message);
          setStatus('error');
        }

              <button className={granularity === 'month' ? 'active' : ''} onClick={() => setGranularity('month')}>Monthly</button>

          <div className="controls">
            <div style={{ display: 'flex', gap: '15px', alignItems: 'center' }}>

                <select value={filterType} onChange={(e) => handleFilterTypeChange(e.target.value)} style={{ padding: '6px', marginRight: '10px', borderRadius: '4px', border: '1px solid #ccc', fontSize: '12px' }}>
                  <option value="location">By Location</option>
                  <option value="market">By Market</option>

                  {currentOptions.map((opt) => (<option key={opt} value={opt}>{opt}</option>))}
                </select>

          </div>
          {error && <div className="error">{error}</div>}
          {status === 'loading' && <div className="loading">Loading production &amp; Square sales data…</div>}

          {status === 'ready' && totals && (
            <>
              <div className="metrics">
                <div className="metric-card">
                  <div className="metric-label">Produced</div>

                  <div className="metric-sub">{totals.wastePct}% of production</div>
                </div>
              </div>
              <div className="chart-container">
                <div className="chart-title">Waste by {granularity === 'day' ? 'Day' : granularity === 'week' ? 'Week' : 'Month'}</div>

                <table>
                  <thead><tr><th>Item</th><th className="num">Ordered</th><th className="num">Received</th><th className="num">Left Over</th><th className="num">Fulfillment %</th><th className="num">Waste %</th></tr></thead>
                  <tbody>

      );

    function ItemMarginDashboard() {
      const [data, setData] = useState(null);

      const [error, setError] = useState('');

      useEffect(() => {
        const baseUrl = window.location.origin;
        fetch(`${baseUrl}/api/item-margins`)
          .then((r) => r.json())
          .then((result) => {
            if (result.error) { setError(result.error); setStatus('error'); return; }
            setData(result);
            setStatus(result.status || 'ready');
          })
          .catch((err) => { setError('Failed to load data: ' + err.message); setStatus('error'); });
      }, []);

      const items = (data && data.items) || [];
      const unmatched = (data && data.unmatchedRecipes) || [];
      const avgPct = items.length ? items.reduce((s, it) => s + it.percent, 0) / items.length : 0;
      const maxPct = items.length ? items[0].percent : 0;
      const scaleMax = Math.max(100, Math.ceil((maxPct * 1.05) / 10) * 10);
      const refLinePct = scaleMax > 100 ? (100 / scaleMax) * 100 : null;

      return (
        <div className="container">
          <header>
            <h1>🥐 Item Margins</h1>
            <p className="subtitle">Ingredient cost as a share of listed price, per item — Square catalog price vs. recipe cost</p>
          </header>
          {error && <div className="error">{error}</div>}
          {status === 'loading' && <div className="loading">Loading recipes &amp; Square catalog prices…</div>}
          {status === 'empty' && <div className="empty">No recipes uploaded yet. Upload recipes.csv to populate this view.</div>}
          {status === 'ready' && items.length === 0 && unmatched.length === 0 && (
            <div className="empty">No recipes matched a Square catalog item by name.</div>
          )}
          {status === 'ready' && items.length > 0 && (
            <>
              <div className="metrics">
                <div className="metric-card">
                  <div className="metric-label">Items Tracked</div>
                  <div className="metric-value">{items.length}</div>
                  <div className="metric-sub">{unmatched.length} recipe{unmatched.length === 1 ? '' : 's'} unmatched</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Average Ingredient Cost</div>
                  <div className="metric-value">{avgPct.toFixed(1)}%</div>
                  <div className="metric-sub">of listed price</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Highest</div>
                  <div className="metric-value" style={{ color: '#d03b3b' }}>{items[0].percent.toFixed(1)}%</div>
                  <div className="metric-sub">{items[0].name}</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Lowest</div>
                  <div className="metric-value" style={{ color: '#2f9e44' }}>{items[items.length - 1].percent.toFixed(1)}%</div>
                  <div className="metric-sub">{items[items.length - 1].name}</div>
                </div>
              </div>
              <div className="chart-container">
                <div className="chart-title">Ingredient Cost as % of Listed Price</div>
                <div className="panel-hint">
                  Sorted highest to lowest — the top items are where ingredients eat the biggest share of the price.
                  {refLinePct != null && ' The dashed line marks 100% (ingredient cost equals the listed price).'}
                </div>
                <div className="margin-bar-list">
                  {items.map((it) => {
                    const widthPct = Math.min(100, (it.percent / scaleMax) * 100);
                    return (
                      <div className="margin-bar-row" key={it.name}>
                        <div className="margin-bar-label" title={it.name}>{it.name}</div>
                        <div className="margin-bar-track">
                          {refLinePct != null && <div className="margin-bar-refline" style={{ left: `${refLinePct}%` }} />}
                          <div className="margin-bar-fill" style={{ width: `${widthPct}%` }} />
                        </div>
                        <div className="margin-bar-value">
                          {it.percent.toFixed(1)}%
                          <span className="margin-bar-detail">{fmtMoney(it.ingredientCost)} / {fmtMoney(it.listedPrice)}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </>
          )}
          {unmatched.length > 0 && (
            <div className="panel">
              <div className="panel-title">Recipes without a matching Square item</div>
              <div className="panel-hint">These are in recipes.csv but no active Square catalog item has this exact name — rename the recipe to match Square's item name, or it's not currently sold.</div>
              <table>
                <thead><tr><th>Recipe name</th></tr></thead>
                <tbody>{unmatched.map((name) => (<tr key={name}><td>{name}</td></tr>))}</tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    function MainApp() {
      const [activeTab, setActiveTab] = useState('dashboard');
      return (
        <div>
          <div style={{ background: '#f5f1ed', borderBottom: '2px solid #d4b5a0', paddingTop: '20px' }}>
            <div className="container">
              <div className="tabs">
                <button className={`tab-button ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>Financial Dashboard</button>
                <button className={`tab-button ${activeTab === 'overtime' ? 'active' : ''}`} onClick={() => setActiveTab('overtime')}>Overtime Report</button>
                <button className={`tab-button ${activeTab === 'prime-cost' ? 'active' : ''}`} onClick={() => setActiveTab('prime-cost')}>Prime Cost</button>
                <button className={`tab-button ${activeTab === 'pl-channel' ? 'active' : ''}`} onClick={() => setActiveTab('pl-channel')}>P&L by Channel</button>
                <button className={`tab-button ${activeTab === 'waste' ? 'active' : ''}`} onClick={() => setActiveTab('waste')}>Waste</button>
                <button className={`tab-button ${activeTab === 'item-margins' ? 'active' : ''}`} onClick={() => setActiveTab('item-margins')}>Item Margins</button>
              </div>
            </div>
          </div>
          <div className={`tab-content ${activeTab === 'dashboard' ? 'active' : ''}`}><DashboardContent /></div>
          <div className={`tab-content ${activeTab === 'overtime' ? 'active' : ''}`}><OvertimeContent /></div>
          <div className={`tab-content ${activeTab === 'prime-cost' ? 'active' : ''}`}><PrimeCostDashboard /></div>
          <div className={`tab-content ${activeTab === 'pl-channel' ? 'active' : ''}`}><PLByChannelDashboard /></div>
          <div className={`tab-content ${activeTab === 'waste' ? 'active' : ''}`}><WasteDashboard /></div>
          <div className={`tab-content ${activeTab === 'item-margins' ? 'active' : ''}`}><ItemMarginDashboard /></div>
        </div>
      );
    }
    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      if (!isAuthenticated) return <LoginScreen onLogin={() => setIsAuthenticated(true)} />;
      return <MainApp />;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
