<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakery Overtime Report</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f1ed;
      color: #2c2416;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      margin-bottom: 30px;
    }

    h1 {
      font-size: 32px;
      color: #6b4423;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #8b6c57;
      font-size: 14px;
    }

    .week-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 30px 0;
    }

    button {
      padding: 10px 16px;
      border: 1px solid #d4b5a0;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      color: #6b4423;
    }

    button:hover {
      background: #e8ddd5;
      border-color: #6b4423;
    }

    button.active {
      background: #6b4423;
      color: white;
      border-color: #6b4423;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }

    .metric-card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      border-left: 4px solid #6b4423;
    }

    .metric-label {
      font-size: 12px;
      color: #8b6c57;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 600;
      color: #6b4423;
    }

    .panel {
      background: white;
      padding: 24px;
      border-radius: 8px;
      margin: 30px 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #6b4423;
      margin-bottom: 20px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 180px 1fr 130px;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
    }

    .bar-row-label {
      font-size: 13px;
      color: #2c2416;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-track {
      background: #f0e8e0;
      border-radius: 4px;
      height: 22px;
      position: relative;
    }

    .bar-fill {
      background: #6b4423;
      height: 100%;
      border-radius: 4px;
      min-width: 4px;
      transition: filter 0.15s;
      cursor: pointer;
    }

    .bar-fill:hover {
      filter: brightness(1.15);
    }

    .bar-row-value {
      font-size: 13px;
      font-weight: 600;
      color: #6b4423;
    }

    .bar-tooltip {
      position: absolute;
      background: #2c2416;
      color: white;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      transform: translateY(-115%);
      z-index: 10;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      color: #8b6c57;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #e8ddd5;
    }

    th.num, td.num {
      text-align: right;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #f0e8e0;
    }

    tr.fn-row {
      cursor: pointer;
    }

    tr.fn-row:hover {
      background: #faf6f2;
    }

    .expand-icon {
      display: inline-block;
      width: 14px;
      color: #8b6c57;
    }

    .employee-detail {
      background: #faf6f2;
    }

    .employee-detail td {
      padding: 8px 12px 8px 40px;
      font-size: 12px;
      color: #5a4a3a;
      border-bottom: 1px solid #f0e8e0;
    }

    .empty, .error, .loading {
      padding: 24px;
      border-radius: 8px;
      margin: 20px 0;
      font-size: 14px;
    }

    .empty, .loading {
      background: white;
      color: #8b6c57;
    }

    .error {
      background: #fee;
      color: #c33;
    }

    .footnote {
      font-size: 12px;
      color: #8b6c57;
      line-height: 1.6;
      margin-top: 10px;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1614;
        color: #e8ddd5;
      }
      h1 {
        color: #e8b9a0;
      }
      button {
        background: #2c2416;
        color: #e8b9a0;
        border-color: #5a3a1e;
      }
      button:hover {
        background: #3a3228;
      }
      .metric-card, .panel, .empty, .loading {
        background: #2c2416;
        color: #e8ddd5;
      }
      .metric-value, .panel-title, .bar-row-value {
        color: #e8b9a0;
      }
      .bar-track {
        background: #3a3228;
      }
      .bar-fill {
        background: #e8b9a0;
      }
      th {
        border-bottom-color: #3a3228;
      }
      td {
        border-bottom-color: #3a3228;
        color: #e8ddd5;
      }
      tr.fn-row:hover {
        background: #3a3228;
      }
      .employee-detail, .employee-detail td {
        background: #241d17;
        color: #cbb9a8;
        border-bottom-color: #3a3228;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DASHBOARD_PASSWORD = 'bakery123';

    function LoginScreen({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (password === DASHBOARD_PASSWORD) {
          onLogin();
        } else {
          setError('Incorrect password');
          setPassword('');
        }
      };

      return (
        <div style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          minHeight: '100vh',
          background: '#f5f1ed'
        }}>
          <div style={{
            background: 'white',
            padding: '40px',
            borderRadius: '12px',
            boxShadow: '0 4px 12px rgba(0,0,0,0.1)',
            width: '100%',
            maxWidth: '320px'
          }}>
            <h1 style={{ textAlign: 'center', color: '#6b4423', marginBottom: '30px', fontSize: '24px' }}>
              🍞 Overtime Report
            </h1>
            <form onSubmit={handleSubmit}>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                placeholder="Enter password"
                autoFocus
                style={{
                  width: '100%',
                  padding: '12px',
                  border: '1px solid #d4b5a0',
                  borderRadius: '6px',
                  fontSize: '14px',
                  marginBottom: '12px',
                  boxSizing: 'border-box'
                }}
              />
              {error && <div style={{ color: '#c33', fontSize: '12px', marginBottom: '12px' }}>{error}</div>}
              <button
                type="submit"
                style={{
                  width: '100%',
                  padding: '12px',
                  background: '#6b4423',
                  color: 'white',
                  border: 'none',
                  borderRadius: '6px',
                  fontSize: '14px',
                  fontWeight: '600',
                  cursor: 'pointer'
                }}
              >
                Login
              </button>
            </form>
          </div>
        </div>
      );
    }

    const fmtHours = (h) => `${h.toFixed(1)}h`;
    const fmtMoney = (v) => `$${v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    const fmtWeekLabel = (weekStart, weekEnd) => {
      const opts = { month: 'short', day: 'numeric' };
      const s = new Date(`${weekStart}T00:00:00`).toLocaleDateString(undefined, opts);
      const e = new Date(`${weekEnd}T00:00:00`).toLocaleDateString(undefined, opts);
      return `${s} – ${e}`;
    };

    // Single-series horizontal bar chart: one hue, sorted by magnitude, direct labels, hover tooltip
    function OvertimeBarChart({ functions }) {
      const [hovered, setHovered] = useState(null);
      const sorted = [...functions].sort((a, b) => b.otHours - a.otHours);
      const maxHours = Math.max(...sorted.map((f) => f.otHours), 0.01);

      return (
        <div>
          {sorted.map((f) => (
            <div className="bar-row" key={f.function}>
              <div className="bar-row-label" title={f.function}>{f.function}</div>
              <div className="bar-track">
                <div
                  className="bar-fill"
                  style={{ width: `${Math.max((f.otHours / maxHours) * 100, 1)}%` }}
                  onMouseEnter={() => setHovered(f.function)}
                  onMouseLeave={() => setHovered(null)}
                >
                  {hovered === f.function && (
                    <div className="bar-tooltip">
                      {f.function}: {fmtHours(f.otHours)} OT &middot; {fmtMoney(f.otWage)}
                    </div>
                  )}
                </div>
              </div>
              <div className="bar-row-value">{fmtHours(f.otHours)} &middot; {fmtMoney(f.otWage)}</div>
            </div>
          ))}
        </div>
      );
    }

    function FunctionTable({ functions, employeeDetail }) {
      const [expanded, setExpanded] = useState(null);
      const toggle = (fn) => setExpanded(expanded === fn ? null : fn);

      return (
        <table>
          <thead>
            <tr>
              <th>Function</th>
              <th className="num">Regular Hrs</th>
              <th className="num">OT Hrs (1.5x)</th>
              <th className="num">OT Hrs (2x)</th>
              <th className="num">OT Wage</th>
            </tr>
          </thead>
          <tbody>
            {functions.map((f) => (
              <React.Fragment key={f.function}>
                <tr className="fn-row" onClick={() => toggle(f.function)}>
                  <td>
                    <span className="expand-icon">{expanded === f.function ? '▾' : '▸'}</span>
                    {f.function}
                  </td>
                  <td className="num">{fmtHours(f.regularHours)}</td>
                  <td className="num">{fmtHours(f.ot15Hours)}</td>
                  <td className="num">{fmtHours(f.ot2Hours)}</td>
                  <td className="num">{fmtMoney(f.otWage)}</td>
                </tr>
                {expanded === f.function && (
                  !employeeDetail ? (
                    <tr className="employee-detail">
                      <td colSpan="5">Employee-level detail requires a live Square connection (this view is showing an aggregate snapshot).</td>
                    </tr>
                  ) : f.employees.length ? f.employees.map((e) => (
                    <tr className="employee-detail" key={e.name}>
                      <td colSpan="3">{e.name}</td>
                      <td className="num" colSpan="1">{fmtHours(e.otHours)}</td>
                      <td className="num">{fmtMoney(e.otWage)}</td>
                    </tr>
                  )) : (
                    <tr className="employee-detail">
                      <td colSpan="5">No individual employee crossed into overtime this week for this function.</td>
                    </tr>
                  )
                )}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      );
    }

    function OvertimeContent() {
      const [weeks, setWeeks] = useState([]);
      const [employeeDetail, setEmployeeDetail] = useState(true);
      const [selectedWeek, setSelectedWeek] = useState(0);
      const [status, setStatus] = useState('loading');
      const [error, setError] = useState('');

      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async () => {
        try {
          setStatus('loading');
          const baseUrl = window.location.origin;
          const response = await fetch(`${baseUrl}/api/overtime?weeks=8`);
          const result = await response.json();
          if (result.error) {
            setError(result.error);
            setStatus('error');
            return;
          }
          const sorted = [...(result.weeks || [])].sort((a, b) => b.weekStart.localeCompare(a.weekStart));
          setWeeks(sorted);
          setEmployeeDetail(result.employeeDetail !== false);
          setSelectedWeek(0);
          setStatus(sorted.length ? 'ready' : 'empty');
        } catch (err) {
          setError('Failed to load data: ' + err.message);
          setStatus('error');
        }
      };

      const week = weeks[selectedWeek];

      return (
        <div className="container">
          <header>
            <h1>🍞 Bakery Overtime Report</h1>
            <p className="subtitle">Weekly overtime wages by function, from Square timecards</p>
          </header>

          {status === 'loading' && <div className="loading">Loading timecards from Square&hellip;</div>}
          {status === 'error' && <div className="error">{error}</div>}
          {status === 'empty' && <div className="empty">No timecards found for the selected weeks.</div>}

          {status === 'ready' && (
            <React.Fragment>
              <div className="week-buttons">
                {weeks.map((w, i) => (
                  <button
                    key={w.weekStart}
                    className={selectedWeek === i ? 'active' : ''}
                    onClick={() => setSelectedWeek(i)}
                  >
                    {fmtWeekLabel(w.weekStart, w.weekEnd)}
                  </button>
                ))}
              </div>

              <div className="metrics">
                <div className="metric-card">
                  <div className="metric-label">Total OT Hours</div>
                  <div className="metric-value">{fmtHours(week.totalOtHours)}</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Total OT Wages</div>
                  <div className="metric-value">{fmtMoney(week.totalOtWage)}</div>
                </div>
                <div className="metric-card">
                  <div className="metric-label">Functions with OT</div>
                  <div className="metric-value">{week.functions.filter((f) => f.otHours > 0).length}</div>
                </div>
              </div>

              <div className="panel">
                <div className="panel-title">Overtime Hours by Function &mdash; {fmtWeekLabel(week.weekStart, week.weekEnd)}</div>
                {week.functions.some((f) => f.otHours > 0) ? (
                  <OvertimeBarChart functions={week.functions.filter((f) => f.otHours > 0)} />
                ) : (
                  <p style={{ color: '#8b6c57', fontSize: '13px' }}>No overtime this week.</p>
                )}
              </div>

              <div className="panel">
                <div className="panel-title">By Function</div>
                <FunctionTable functions={week.functions} employeeDetail={employeeDetail} />
                <div className="footnote">
                  Overtime is estimated under California rules: 1.5&times; after 8 hrs/day or 40 hrs/week, 2&times; after 12 hrs/day,
                  and 1.5&times;/2&times; on the 7th consecutive workday in a workweek. When an employee split time across more
                  than one function in a week, their overtime hours and wages are allocated across those functions in
                  proportion to hours worked in each. Click a function row to see which employees drove its overtime.
                </div>
              </div>
            </React.Fragment>
          )}
        </div>
      );
    }

    function OvertimeApp() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);

      if (!isAuthenticated) {
        return <LoginScreen onLogin={() => setIsAuthenticated(true)} />;
      }

      return <OvertimeContent />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<OvertimeApp />);
  </script>
</body>
</html>
